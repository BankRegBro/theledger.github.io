const ENFORCEMENT = {
  disclaimer: 'Illustrative figures. The percentages below are composite, directional estimates synthesized from public enforcement actions and secondary analysis (e.g., Klaros Group BaaS enforcement tracking, Fintech Takes reporting). They are not from a single published dataset and should be read as enforcement patterns, not as citable statistics.',

const DORA = {
  overview: 'The EU Digital Operational Resilience Act (DORA) \u2014 Regulation (EU) 2022/2554, applied from January 17, 2025 \u2014 is broader and more prescriptive than U.S. interagency guidance. Where U.S. regulators take a \u201ctechnology-neutral\u201d approach, DORA requires financial entities to ensure their ICT supply chain meets resilience standards. DORA increasingly influences global best practice, and U.S. banks with EU operations or EU-parent affiliates may be in scope.',
  comparison: [
    { dimension:'Scope', us:'Third-party relationships; principles-based, commensurate with risk', eu:'All ICT service providers; prescriptive, no materiality threshold' },
    { dimension:'Nth-Party', us:'\u201cManaging the manager\u201d \u2014 indirect; requires third party\u2019s own TPRM program', eu:'Direct ICT supply chain oversight for critical providers; concentration risk reporting required' },
    { dimension:'Testing', us:'Evidence of testing and historical performance expected', eu:'Resilience testing for critical ICT providers; threat-led penetration testing (TLPT)' },
    { dimension:'Incident Report', us:'Computer-security incident notification within 36 hours (2022 rule); no unified format for all incidents', eu:'Initial / intermediate / final reporting timeline for major incidents to a designated authority' },
    { dimension:'Cloud/AI', us:'Technology-neutral; no specific cloud architecture mandated', eu:'Cloud providers explicitly in scope; hyperscaler concentration risk specifically addressed' },
    { dimension:'Contracts', us:'Guidance on key provisions; no mandatory minimum clause list', eu:'Mandatory contractual provisions for critical ICT providers; standardized templates encouraged' }
  ],

};
// -- OMF: OVERSIGHT MATURITY FRAMEWORK ---------------------------------------

  tprm:     { label:'OMF \u00b7 TPRM',                color:'#c9a84c', domain:'Third-Party Risk Management' },
  aml:      { label:'OMF \u00b7 BSA/AML',             color:'#5aabdf', domain:'BSA/AML Program' },
  cms:      { label:'OMF \u00b7 Compliance Mgmt',     color:'#7ab07a', domain:'Compliance Management System' },

};

const OMF_LEVELS = [
  { id:'L1', name:'Ad Hoc',     color:'#c05050', note:'Undocumented, reactive, person-dependent' },

];
const OMF_THRESHOLD = 'Critical-tier relationships: reach L3 (Defined) minimum before go-live; L4 (Managed) within 12 months. A regression in any domain warrants a formal remediation plan.';

const EXAMINER_QUESTIONS = {
  planning: [
    { cat:'Governance', q:'Does the board-approved risk appetite specifically account for the unique risks of this partnership, and are there predefined \u201cred lines\u201d that would trigger a withdrawal from the relationship?', flag:'If the bank cannot name a specific risk appetite threshold for this relationship type, the planning stage is incomplete.' },

    { cat:'Ledger Access', q:'Does the agreement provide for daily \u2014 or more frequent \u2014 automated reconciliation between the third party\u2019s records and the bank\u2019s core, with protocols to resolve any reconciliation breaks?', flag:'This is the provision absent in Synapse arrangements. Daily reconciliation for covered custodial accounts would become a regulatory baseline under the FDIC\u2019s proposed rule.' },
    { cat:'Cybersecurity', q:'What is the timeline for the third party to notify the bank of a potential data breach, and does the contract allow the bank to participate in the forensic investigation?', flag:'A 36\u201372 hour window is a reasonable minimum for initial notification \u2014 not the window to complete the investigation.' },

    { cat:'Resilience', q:'Has the bank conducted scenario testing \u2014 simulating a total outage of the critical vendor \u2014 to test its internal response and manual workaround procedures?', flag:'DORA requires this. U.S. examiners increasingly ask: has the bank practiced operating without this vendor?' },
    { cat:'Model Risk', q:'Has the bank implemented periodic disparate-impact monitoring for AI-driven credit and identity verification decisions, at a cadence matched to model retraining frequency?', flag:'Annual fair lending monitoring is insufficient for systems that retrain quarterly. A model may introduce and resolve a disparate impact issue within a monitoring period the bank would never detect.' },
    { cat:'Consumer', q:'Have customer-facing interfaces and marketing materials been reviewed on an ongoing basis \u2014 not just at launch \u2014 to ensure continued compliance with FDIC advertising rules?', flag:'Fintechs update their UX frequently. A launch-only marketing review is a common monitoring gap.' }

    { cat:'Data', q:'Is there a detailed offboarding checklist covering access termination, return of physical assets, certified destruction from all named subprocessors, and a verification mechanism?', flag:'Certified destruction from the vendor without certification from each named subprocessor is incomplete.' },

    { cat:'Resilience', q:'Does the bank have a pre-identified alternative provider or in-house pathway that has been tested \u2014 not just documented \u2014 with a defined \u201crunway\u201d the transition clause must cover?', flag:'A contingency documented but not tested will fail under the time pressure of a forced exit.' }

{
  id:'contract', number:'03', title:'Contract', sub:'Terms that protect the bank, consumer, and supply chain', color:'#7ab07a',
  guidance:'Banking organizations should have written contracts that clearly define the rights and responsibilities of all parties. Contracts with third parties involved in critical activities should address the nature and scope of the arrangement, performance measures, audit and inspection rights, ownership of data, confidentiality and integrity, business continuity obligations, default and termination provisions, dispute resolution, and applicable law.',
  cites:['FIL-29-2023 \u2014 Life Cycle: Contract Negotiation', '2024 Community Bank TPRM Guide (May 3, 2024)', 'OMF: TPRM + Consumer'],
  activities: [
    { label:'Scope of delegated functions with compliance pass-through', cfes:'cms',
      detail:'Define precisely what the vendor performs and what the bank retains. Consumer protection obligations should flow to end customers as if they were the bank\u2019s direct customers. GLBA data use restrictions must be explicit: prohibit the third party from reusing or redisclosing bank customer NPI for its own marketing or selling it to other parties. General \u201cdata protection\u201d language is insufficient.' },
    { label:'Unconditional audit and inspection rights \u2014 including nth parties', cfes:'tprm',
      detail:'Retain the right to audit the vendor and all material subcontractors, without advance notice or vendor consent. For AI vendors: audit rights extend to model documentation, training data descriptions, and performance logs. Allow the bank to participate in forensic investigations following any breach at the vendor or any named subcontractor.' },
    { label:'Daily FBO reconciliation with automated verification', cfes:'ops',
      detail:'For BaaS and BNPL: require daily automated reconciliation between the third party\u2019s records and the bank\u2019s core, with protocols to resolve breaks. The FDIC\u2019s proposed custodial deposit rule would make daily reconciliation a regulatory baseline for covered accounts. \u201cLedger hostage\u201d clauses \u2014 where only the fintech can produce the reconciliation \u2014 are unacceptable.' },
    { label:'Cybersecurity: zero-trust, breach notification, API security', cfes:'ops',
      detail:'Address: (1) zero-trust or network segmentation controls to prevent lateral movement following a breach at the third party; (2) a specific breach notification timeline (a 36\u201372 hour maximum from initial detection is a reasonable benchmark); (3) the bank\u2019s right to participate in forensic investigation; (4) the third party\u2019s obligation to maintain cyber insurance.' },
    { label:'FDIC insurance representation and consumer confusion controls', cfes:'cms',
      detail:'Require: (1) customer-facing materials explicitly identify the bank as the deposit-holding institution; (2) no fintech representation as an FDIC-insured bank; (3) ongoing review of UI updates for insurance representation compliance, not just a pre-launch review. Violations trigger an automatic notification event and cure period.' },
    { label:'SLAs with financial consequences', cfes:'ops',
      detail:'Every KPI should have a defined measurement methodology, period, threshold, and a specified financial consequence (fee credit, cure period, termination right) for non-performance. SLAs without consequences are marketing commitments.' },
    { label:'Data ownership, portability, and multi-party certified destruction', cfes:'ops',
      detail:'All customer data owned by the bank. Migration timeline: defined maximum (e.g., 30 days). Certified destruction within a defined window from the vendor AND each named subprocessor separately. Verify independently where possible. Data portability provisions must be enforceable against a bankruptcy receiver \u2014 not just a solvent vendor.' }
  ],
  risks: [
    { level:'high', text:'GLBA data reuse restriction absent \u2014 a fintech that can use or sell bank customer NPI for its own marketing will; general \u201cdata protection\u201d language does not prevent this' },
    { level:'high', text:'API integration zero-trust gap \u2014 without network segmentation, a breach at the fintech enables lateral movement into bank systems' },
    { level:'high', text:'FBO \u201cledger hostage\u201d \u2014 no contractual right to a real-time ledger snapshot independent of middleware makes customer fund reconciliation impossible upon failure' },
    { level:'med', text:'FDIC advertising ongoing review absent \u2014 a one-time pre-launch review without ongoing contractual monitoring creates a recurring compliance gap' },
    { level:'med', text:'Portability not enforceable against bankruptcy receiver \u2014 provisions that evaporate at insolvency are inadequate exactly when most needed' },
    { level:'low', text:'Consumer protection pass-through gap \u2014 fintech\u2019s customers are the bank\u2019s regulatory responsibility but not contractual counterparties without explicit pass-through' }
  ],
  insight: { src:'DORA / industry analysis', text:'DORA requires mandatory contractual provisions for all critical ICT providers; standardized templates are encouraged. U.S. interagency guidance stops short of mandating specific contract terms, but enforcement actions consistently cite absent or inadequate contractual provisions as a primary compliance failure. The practical standard is becoming DORA-influenced even for U.S.-only institutions: what a DORA-compliant contract requires is increasingly what U.S. examiners expect to see.' },
  examples: {
    baas: {
      title:'Riverton \u00d7 PayFlow: Contract Negotiation',
      situation:'Riverton\u2019s counsel leads 8 weeks of negotiation on PayFlow\u2019s standard 3-year agreement.',
      steps: [
        'Scope: PayFlow performs acquisition, UX, first-line complaint handling. Riverton retains account opening, BSA/AML, SAR authority, dispute resolution final authority. GLBA exhibit: explicit prohibition on PayFlow using or disclosing Riverton customer NPI for any purpose other than program operations.',
        'FBO reconciliation: daily automated API endpoint \u2014 Riverton pulls a daily snapshot directly from its core, independent of PayFlow\u2019s middleware. Discrepancy over $500 triggers 2-hour investigation. Structured to anticipate the FDIC\u2019s proposed custodial deposit rule.',
        'Cybersecurity: OAuth 2.0 with zero-trust segmentation \u2014 PayFlow\u2019s system cannot traverse beyond the API gateway into Riverton\u2019s core network. Breach notification: 48 hours from initial detection.',
        'FDIC Part 328: PayFlow must submit all customer-facing UI updates within 5 business days of deployment; any insurance representation language must be approved before going live.',
        'Nth-party flow-down: PayFlow must maintain a vendor management program for Verified Inc., Stripe, and middleware; provide Riverton its fourth-party risk assessments annually; notify within 48 hours of any material change.'
      ],
      flags: [
        'PayFlow initially proposed CCPA \u201cpersonal data\u201d as the definition \u2014 rejected. Contract uses GLBA NPI explicitly.',
        'Nth-party flow-down is novel for PayFlow. Riverton\u2019s position: if PayFlow cannot manage its own vendor relationships, Riverton\u2019s fourth-party exposure is unlimited.'

        'Nth-party flow-down: Indian data normalization vendor must sign a GLBA-compliant data processing agreement naming Heartland as a beneficiary.'

      flags: [

      situation:'Eastport and counsel build AI-specific provisions not in ClearTrace\u2019s standard contract.',

{
  id:'monitoring', number:'04', title:'Monitoring', sub:'Continuous oversight \u2014 near real-time for critical relationships', color:'#d4a84c',
  guidance:'Banking organizations should conduct ongoing monitoring of their third-party relationships throughout the life of the relationship. Monitoring activities should be commensurate with the level of risk and complexity of the relationship and should include reviewing and analyzing reports, monitoring for changing conditions that may affect the third party\u2019s risk profile, and evaluating business continuity and information security.',
  cites:['FIL-29-2023 \u2014 Life Cycle: Ongoing Monitoring', 'FDIC NPRM: Custodial Accounts (RIN 3064-AG07, Sept 17, 2024)', 'DORA Op. Resilience Standards'],
  activities: [
    { label:'Daily FBO triangular reconciliation \u2014 automated, not periodic', cfes:'ops',
      detail:'For deposit and credit BaaS: execute daily triangular reconciliation \u2014 Bank Core / Middleware Sub-ledger / Fintech App Ledger. The FDIC\u2019s proposed custodial deposit rule would make daily reconciliation a regulatory baseline. Any discrepancy over a defined threshold should be investigated and resolved within 24 hours. The Synapse failure left an estimated $65\u2013$96M in consumer funds unreconcilable because no party was performing this continuously.' },
    { label:'Portfolio-level cloud and nth-party concentration monitoring', cfes:'ops',
      detail:'Maintain a bank-wide fourth-party dependency map updated quarterly. Track which cloud providers, data bureaus, and payment rails support which third-party relationships. When a concentration threshold is crossed (e.g., 3+ Critical-tier vendors on the same cloud provider), escalate to the CRO with a mitigation plan.' },
    { label:'FDIC advertising and consumer confusion surveillance', cfes:'cms',
      detail:'Monitor fintech partner UIs on a monthly basis for insurance representation compliance. Fintechs update UX frequently. A compliance gap introduced in a UI update may persist for months before the next scheduled review. Automated UI monitoring tools should be deployed for Critical-tier BaaS relationships.' },
    { label:'Model performance \u2014 monthly benchmarking, periodic bias, annual revalidation', cfes:'model',
      detail:'Monthly performance benchmarking against the bank\u2019s population; disaggregated bias assessment at a cadence matched to retraining frequency; annual full revalidation. Monitor for model drift: a score distribution shift over a defined threshold month-over-month triggers investigation. Apply the 2026 interagency model risk guidance\u2019s risk-based, tiered approach; treat generative or agentic AI components under a separate governance regime.' },
    { label:'DORA-influenced scenario testing \u2014 simulating total vendor outage', cfes:'ops',
      detail:'At minimum annually: scenario test simulating total outage of each Critical-tier vendor. Test the bank\u2019s ability to operate using manual workarounds, secondary vendors, or in-house capabilities. Document results. An untested outage scenario is an assumed capability, not a demonstrated one.' },
    { label:'Consumer complaint surveillance across the full population', cfes:'consumer',
      detail:'Monitor complaint volumes monthly, disaggregated by type, resolution rate, and resolution time. Require the fintech to share all complaints \u2014 not just escalated. A rising complaint rate is the earliest and most reliable leading indicator of pending enforcement action.' },
    { label:'OMF re-assessment \u2014 annual and event-triggered', cfes:'tprm',
      detail:'Reassess OMF maturity ratings annually. Trigger immediate re-assessment upon: regulatory action, material complaint surge, model update, financial distress, ownership change, or material subcontractor change. A regression in any domain warrants a formal remediation plan.' }
  ],
  risks: [
    { level:'high', text:'FBO reconciliation monthly instead of daily \u2014 a $500 daily discrepancy compounds to $15,000 by the next monthly review; a systematic error compounds to millions before detection (Synapse)' },
    { level:'high', text:'FDIC advertising gap \u2014 fintech UI updates introducing insurance misrepresentation between scheduled reviews; monthly UI monitoring is the mitigation' },
    { level:'high', text:'Portfolio-level cloud concentration invisible \u2014 no mechanism to track cumulative exposure across the third-party portfolio; detected only after a systemic outage' },
    { level:'med', text:'Scenario testing absent \u2014 documented manual workarounds never executed under simulated stress; operational buffers are theoretical, not demonstrated' },
    { level:'med', text:'Complaint surveillance limited to escalations \u2014 the fintech\u2019s escalation judgment determines what the bank sees' },
    { level:'low', text:'OMF re-assessment triggered only by scheduled review \u2014 material changes in fintech condition do not automatically trigger an update' }
  ],
  insight: { src:'DORA / 2024 Community Bank TPRM Guide', text:'Modern TPRM is moving from \u201cpreventing all failures\u201d toward \u201cresilient recovery.\u201d In a multi-cloud environment, some degree of third-party failure is inevitable. Resilient institutions build operational buffers: secondary vendor relationships and staff trained on manual workarounds. For critical vendors, this includes annual scenario testing where the bank simulates a total outage to test its internal response \u2014 a practice DORA mandates and U.S. examiners increasingly request.' },
  examples: {

      situation:'Riverton has been live 14 months with 67,000 accounts. Daily FBO reconciliation API operational.',
      steps: [
        'Day 392: automated reconciliation shows $47,200 discrepancy across 12 accounts. Investigation initiated within 2 hours. Root cause: PayFlow processing lag during a system update. All 12 reconciled. No customer funds at risk. Without daily reconciliation, this would have been over $2M by the next monthly review.',
        'Month 11: complaint rate hits 3.2% (contractual threshold: 2%). PayFlow changed its dispute resolution timeline without notifying Riverton \u2014 SLA breach plus notification breach. 30-day remediation required.',
        'Month 12: Riverton\u2019s automated UI monitoring tool detects a PayFlow app update that includes \u201cYour PayFlow account is FDIC insured.\u201d Misrepresentation \u2014 FDIC insurance attaches to Riverton\u2019s charter. Notified within 2 hours; rolled back within 24.',
        'Month 14: Verified Inc. (PayFlow\u2019s KYC vendor) acquired by a foreign firm \u2014 fourth-party change event. Riverton also conducts its first annual scenario test: 72-hour PayFlow outage. Manual account management of 67,000 accounts is feasible for 24 hours but not 72. Riverton develops an interim contingency relationship with a second BaaS middleware provider.'
      ],
      flags: [

        'GLBA audit: Heartland reviews LoanBridge\u2019s data use logs. Finding: LoanBridge has been using Heartland customer repayment data to retrain a model also deployed for a competing bank\u2019s lending program. GLBA breach \u2014 Heartland customer data used to improve a competitor\u2019s model.',

      situation:'First Meridian is 8 months post go-live. Standard monitoring plus first annual scenario test.',
      steps: [

  id:'termination', number:'05', title:'Termination', sub:'Ending relationships without ending the bank', color:'#c06060',
  guidance:'Banking organizations should develop contingency plans for when third-party relationships are terminated or fail. For critical activities, plans should address how the banking organization would continue to operate in the absence of the third party, how it would protect customer information, and how it would manage the transition. Termination provisions should be included in contracts.',
  cites:['FIL-29-2023 \u2014 Life Cycle: Termination', '2024 Joint Statement on Banks\u2019 Arrangements with Third Parties (July 25, 2024)', 'FDIC NPRM Custodial Accounts (RIN 3064-AG07)'],

    { label:'FBO full triangular reconciliation as a condition precedent to migration', cfes:'ops',
      detail:'For deposit and credit BaaS: execute a full three-ledger reconciliation as the first and condition-precedent step of the termination protocol. No customer notification, no account migration, no public announcement until every dollar is accounted for. Synapse left an estimated $65\u2013$96M unreconcilable because no party had a reconciliation obligation at termination.' },
    { label:'Servicer continuity execution for lending and BNPL', cfes:'ops',

const STRUCTURAL_DIFFS = {
  'baas-core': 'The BaaS deposit program inverts the traditional oversight architecture: the bank provides its charter as infrastructure for the fintech\u2019s customer relationship, while the Core Processor relationship keeps the bank at the center of its own operations. In BaaS, the fintech sees the consumer; the bank sees only the fintech. In core outsourcing, the bank remains the only customer-facing entity \u2014 the vendor is a back-office dependency. The compliance, reconciliation, and exit obligations are structurally different in kind, not just degree.',
  'baas-ai': 'Both involve algorithmic risk, but the accountability architecture differs. In BaaS, the fintech\u2019s AML program is delegated but non-delegable \u2014 the bank owns the BSA obligation regardless of who performs it. In the AML AI vendor relationship, the bank\u2019s own compliance program is the customer of the AI system. The vendor supplies tools; the bank remains the BSA officer. In BaaS, the bank is accountable for what the fintech does to its customers; in AI monitoring, the bank is accountable for what the model tells its own staff.',
  'baas-regtech': 'BaaS exports the bank\u2019s charter to the fintech\u2019s customers. The RegTech/KYC relationship imports the vendor\u2019s compliance tooling into the bank\u2019s onboarding process. One is outward-facing (regulatory capacity distributed to third-party consumers), the other inward-facing (vendor technology enhancing the bank\u2019s execution). Consumer confusion, the three-ledger problem, and servicer continuity are BaaS-specific.',
  'baas-bpo': 'BaaS creates a customer population the bank has never directly served \u2014 the fintech\u2019s end users who hold accounts at the bank through the fintech\u2019s interface. The BPO relationship serves the bank\u2019s own existing customers through a delegated channel. In BaaS, the fintech controls customer experience and the bank controls regulatory liability. In BPO, the bank retains the customer relationship and the vendor controls service delivery.',
  'lending-core': 'AI Lending places the bank in the position of named originator for credit decisions it did not make \u2014 the AI model underwrites, the bank issues. The Core Processor relationship keeps the bank in control of every function it has outsourced. In lending, fair lending, ECOA, and TILA obligations attach to decisions made by a model the bank does not own. In core outsourcing, the bank retains every compliance function; the vendor merely executes the bank\u2019s processes.',
  'lending-ai': 'Both involve AI systems making consequential decisions. The AI lending model determines whether consumers receive credit \u2014 a fair lending and ECOA obligation with direct consumer harm potential. The AML AI model determines which transactions are referred for suspicious activity review \u2014 a BSA obligation with regulatory, not consumer, harm as the primary risk. Both warrant validation under the 2026 interagency model risk guidance; the lending model additionally requires fair lending testing and adverse action notice infrastructure.',
  'lending-regtech': 'AI lending models make credit decisions that determine consumer access to financial products. The RegTech/KYC platform makes identity verification decisions that determine consumer access to bank accounts. Both create disparate access risk if biased against protected groups. But the lending model operates under ECOA/Reg B\u2019s adverse action regime, while identity verification operates under UDAP\u2019s disparate access framework. The regulatory toolkit for challenging each is materially different.',
  'lending-bpo': 'The AI lending fintech performs the bank\u2019s underwriting \u2014 a credit risk and fair lending responsibility. The Contact Center BPO performs customer service \u2014 a regulatory and reputational responsibility. The lending relationship creates regulatory liability for credit decisions; the BPO relationship creates regulatory liability for customer interactions. The compliance architecture, the examiner\u2019s focus, and the enforcement exposure differ.',
  'bnpl-core': 'BNPL makes the bank the issuer of credit obligations it does not service \u2014 the fintech originates, services, and operates while the bank holds the charter liability. The Core Processor relationship makes the bank dependent on a vendor for operational execution but keeps the bank in control of its own customer relationships. In BNPL, the bank\u2019s servicer may become insolvent, leaving the bank as the surviving issuer of a portfolio with no operational capacity.',
  'bnpl-ai': 'Both create consumer-facing compliance obligations that rest with the bank. BNPL\u2019s Reg Z, state licensing, and CFPB oversight create disclosure and credit obligations tied to each loan. The AML AI vendor creates a BSA compliance obligation tied to each suspicious transaction determination. In BNPL, the consumer is the regulatory subject; in AML monitoring, FinCEN and the bank\u2019s SAR program are the regulatory audience.',
  'bnpl-regtech': 'BNPL is a credit product embedded in a merchant experience \u2014 the bank issues credit at the point of purchase. The RegTech/KYC platform is an identity verification tool embedded in the bank\u2019s onboarding. One creates credit obligations (Reg Z, ECOA, state usury), the other identity compliance obligations (BSA CIP, OFAC, GLBA). Both involve consumer-facing algorithmic decisions; neither involves the three-ledger FBO reconciliation challenge that distinguishes deposit-based BaaS.'
};

function getStructuralDiff(id1, id2, s1, s2) {
  if (!id1 || !id2 || id1 === id2 || s1 === s2) return null;
  const key = STRUCTURAL_DIFFS[id1+'-'+id2] ? id1+'-'+id2 :
              STRUCTURAL_DIFFS[id2+'-'+id1] ? id2+'-'+id1 : null;
  if (key) return STRUCTURAL_DIFFS[key];
  if (s1 !== s2) return 'This comparison places a BaaS charter-extension relationship alongside a Traditional operational outsourcing relationship. The core structural difference: in BaaS, the bank\u2019s charter is the product that the fintech distributes to end consumers \u2014 the bank holds regulatory liability for a customer population it has never directly served. In traditional outsourcing, the vendor supports the bank\u2019s own operations and the bank remains the sole customer-facing entity.';
  return null;
}

const STAGE_DIFFS = {
  planning: 'At planning, the structural difference manifests in the leverage dynamic. Traditional outsourcing decisions are bank-driven \u2014 the bank identifies a need, solicits vendors, and retains negotiating authority. BaaS relationships are often fintech-driven: fintechs seek sponsor banks, and in a supply-constrained market, banks eager for fee income accept terms they would reject in traditional procurement. Planning for a BaaS arrangement must explicitly account for this inverted leverage.',
  duediligence: 'Traditional due diligence focuses on the vendor\u2019s ability to perform a defined function reliably. BaaS due diligence must also assess whether the fintech\u2019s compliance culture, customer base, and business model create consumer harm risks the bank will ultimately own. A fintech with a compliant vendor management program but a consumer-hostile product design is a BaaS risk no SOC 2 report will surface.',
  contract: 'Traditional contracts define what the vendor delivers and what the bank pays. BaaS contracts must additionally define how the bank retains control over its charter \u2014 through FBO reconciliation rights, consumer protection pass-throughs, and step-in rights. The contract is the primary mechanism by which a bank avoids becoming a \u201cname only\u201d regulatory cover for a fintech\u2019s product.',
  monitoring: 'Traditional monitoring is periodic \u2014 monthly or quarterly reviews of SLA performance and financial condition. BaaS monitoring must be continuous for deposit arrangements: daily FBO reconciliation, real-time transaction visibility, and monthly consumer complaint surveillance. The FDIC\u2019s proposed custodial deposit rule would make daily reconciliation a regulatory requirement, not a best practice.',
  termination: 'Traditional relationship termination is operationally complex but legally straightforward \u2014 the bank transitions to a substitute vendor. BaaS termination must resolve who owns the customers, who holds their money, and who is responsible for the loans. Regulators have routinely required independent lookback reviews after BaaS termination. Exit from a BaaS relationship is not a procurement event \u2014 it is a regulatory event.'
};

function OMFTag(domain) {

}

function ExpandCard(props) {

  if (errEl) {
    errEl.style.display = 'block';
    errEl.textContent = 'Render error: ' + (e && e.stack ? e.stack : String(e));
  }
}
  </script>
</body>
