    .activities-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: #7a9bc4; text-transform: uppercase; margin-bottom: 14px; }
    .activity-list { display: flex; flex-direction: column; gap: 2px; }
    .activity-row { background: #132952; border: 1px solid #1e3a6e; border-radius: 6px; overflow: hidden; transition: background 0.15s; cursor: pointer; }
    .activity-row:hover { background: rgba(255,255,255,0.04); }

    .risk-text { font-size: 13px; color: #c4d4f0; line-height: 1.7; }

    .enforcement-box .e-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 2px; color: #c9a84c; text-transform: uppercase; margin-bottom: 10px; }
    .enforcement-box p { font-size: 13px; color: #8ab0d8; line-height: 1.75; }

    #footer-bar { border-top: 1px solid #1e3a6e; padding: 10px 32px; background: #0a152c; display: flex; align-items: center; gap: 8px; }

    .progress-seg.active-or-before { opacity: 1; }
    #footer-count { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #7a9bc4; margin-left: 8px; white-space: nowrap; }

<script>
const SCENARIOS=[{id:"baas",label:"BaaS Arrangement",icon:"⬡",desc:"Community bank sponsoring a payments fintech"},{id:"core",label:"Core Processor",icon:"◈",desc:"Mid-size bank migrating to a cloud-native core"},{id:"ai",label:"AI Vendor",icon:"◎",desc:"Bank deploying third-party AI for AML monitoring"},{id:"data",label:"Data Aggregator",icon:"◇",desc:"Bank accessing consumer-permissioned financial data"}];
const STAGES=[{id:"planning",number:"01",title:"Planning",subtitle:"Before engagement begins",color:"#c9a84c",guidance:"Before entering into a third-party relationship, a banking organization should develop a plan for managing the relationship commensurate with the level of risk and complexity of the relationship. Planning should address how the relationship aligns with the bank's strategic goals, the nature of the activity, and how the bank will oversee the third party throughout the relationship.",guidanceCites:["FIL-29-2023 §IV(A)","SR 11-7 (analogous pre-use validation)"],activities:[{label:"Strategic alignment review",detail:"Confirm the third-party relationship supports the bank's stated strategic plan and risk appetite statement."},{label:"Preliminary risk identification",detail:"Identify the categories of risk the relationship may introduce: operational, compliance, reputational, strategic, concentration, and country risk."},{label:"Capacity self-assessment",detail:"Determine whether the bank has personnel with subject-matter expertise sufficient to supervise this type of relationship."},{label:"Regulatory inventory",detail:"Identify all laws, regulations, and supervisory expectations that apply to the activity being outsourced or supported."},{label:"Board / senior management notification",detail:"For critical activities, obtain board or designated committee approval before proceeding to due diligence."},{label:"Relationship tier designation",detail:"Assign a preliminary tier (Critical / Significant / Routine) to calibrate the depth of subsequent diligence required.",proposed:true}],risks:[{level:"high",text:"Strategic drift — entering relationships that expand the bank's risk profile without board-level awareness"},{level:"high",text:"Capacity gap — committing to oversee a relationship type the bank lacks expertise to supervise"},{level:"med",text:"Regulatory blind spot — failing to identify which regulations govern the activity before launch"},{level:"low",text:"Vendor dependency — underestimating switching costs before the relationship begins"}],enforcement:"The BaaS consent orders of 2023–2024 — Cross River, MCB, Vast Bank, B2 Bank, First Fed, Choice Financial, Lineage, Piermont, Sutton — reflect failures concentrated in risk categories that were identifiable at the planning stage. A bank that cannot answer 'Do we have the capacity to supervise this relationship?' before signing is already behind.",examples:{baas:{title:"Riverton Community Bank × PayFlow Inc.",situation:"Riverton ($680M) is approached by PayFlow, a payments fintech seeking a sponsor bank for a prepaid debit card program targeting gig workers. PayFlow will handle customer acquisition and UX; Riverton will hold the accounts and provide FDIC-insured deposit infrastructure.",steps:["CEO and CCO meet with PayFlow leadership. Initial assessment: $2.4M projected annual fee revenue, estimated 40,000 new accounts in Year 1.","Compliance team flags: the gig worker demographic has elevated AML risk (cash-dominant, high velocity). BSA Officer notes Riverton has never run a non-branch deposit program at scale.","Board Risk Committee receives briefing. Preliminary designation: Critical Activity — customer-facing deposit product using bank's charter.","Riverton's TPRM Officer determines the bank lacks a dedicated BaaS compliance team. Hiring plan initiated before diligence proceeds.","Regulatory inventory: BSA/AML, EFTA/Reg E, UDAP, FDIC advertising rules, state money transmission licensing for PayFlow."],redFlags:["Riverton has no prior BaaS experience — capacity gap must be resolved before go-live, not after.","PayFlow's proposed timeline of 90 days to launch is incompatible with adequate planning and diligence."]},core:{title:"First Meridian Bank × NovaCore Systems",situation:"First Meridian ($1.2B) seeks to replace its 1990s legacy core processor with NovaCore, a cloud-native core banking platform. Virtually every bank function — deposits, loans, GL, regulatory reporting — will depend on NovaCore.",steps:["IT Steering Committee initiates a formal core modernization program. Executive sponsor: COO.","Risk identification: NovaCore will host customer PII, process all transactions, generate all regulatory reports. Operational risk is existential.","Preliminary tier: Critical — core banking infrastructure. Full lifecycle scrutiny required.","Board approves $800K due diligence budget including independent third-party technical assessment.","Legal inventories contract term: NovaCore proposes a 10-year agreement with limited termination rights — flagged for negotiation.","Capacity assessment: First Meridian's IT team has legacy core expertise but no cloud infrastructure experience. Training plan developed."],redFlags:["A 10-year lock-in with limited exit rights for a first-time cloud migration is a concentration risk that must be flagged at planning.","No fallback core processor identified — single-vendor dependency for a critical function."]},ai:{title:"Eastport National Bank × ClearTrace AI",situation:"Eastport ($2.1B) is evaluating ClearTrace, a vendor offering AI-powered transaction monitoring for BSA/AML. The system uses ML to score transactions for suspicious activity and auto-generate SAR referrals.",steps:["BSA Officer proposes replacing rule-based TM system with ClearTrace to reduce false positive rate (currently 94%) and staff burden.","Risk identification: ClearTrace's outputs will directly influence SAR filing decisions — a critical compliance function. Errors create regulatory liability.","Preliminary tier: Critical — AI system in an AML decision function. Elevated scrutiny per SR 11-7 model risk principles.","Board Risk Committee briefed. Key question raised: 'Can we explain to an examiner why the model flagged or didn't flag a specific transaction?' ClearTrace cannot fully answer this.","BSA Officer conducts regulatory inventory: FinCEN SAR requirements, FFIEC BSA/AML Manual, SR 11-7 model risk standards.","Capacity self-assessment: Eastport has no model risk management function. Decision: hire a model risk analyst before deployment."],redFlags:["If ClearTrace cannot explain individual transaction scores, Eastport cannot defend SAR decisions to FinCEN — a non-starter for a BSA-critical system.","No model risk function at Eastport means the bank cannot conduct independent validation of the AI."]},data:{title:"Lakeside Federal × Plume Financial Data",situation:"Lakeside Federal ($450M) wants to integrate Plume, a data aggregator, to offer customers a personal financial management (PFM) tool that aggregates account data from external institutions.",steps:["Retail banking VP proposes Plume integration as a customer retention tool. Projected: 15% reduction in account attrition.","Risk identification: Plume will access customer credential data and third-party account data. Data security, privacy, and customer consent are primary risks.","Preliminary tier: Significant — data aggregator handling customer PII and permissioned financial data.","Compliance flags: CFPB Section 1033 rulemaking (consumer data rights) in progress — Plume integration must be structured to comply with forthcoming rule.","Regulatory inventory: GLBA/Reg P, FCRA, state privacy laws, CFPB Section 1033, UDAP.","Board notification: CFO raises reputational risk if Plume experiences a data breach affecting Lakeside customers."],redFlags:["Section 1033 compliance posture of Plume is unknown — a regulatory change mid-relationship could require rapid renegotiation.","Customer consent architecture must be designed before launch, not retrofitted."]}}},{id:"duediligence",number:"02",title:"Due Diligence",subtitle:"Know your third party",color:"#4a9fd4",guidance:"Banking organizations should conduct due diligence on prospective third parties before entering into contracts or relationships. The level of due diligence should be commensurate with the level of risk and complexity of the third-party relationship. For relationships involving critical activities, more robust due diligence is warranted. Due diligence encompasses the third party's financial condition, business experience and reputation, qualifications and backgrounds of key personnel, risk management and controls, information security, resilience, and legal and regulatory compliance.",guidanceCites:["FIL-29-2023 §IV(B)","2024 Community Bank TPRM Guide §III"],activities:[{label:"Financial condition review",detail:"Assess audited financials, liquidity position, capital structure, investor backing, and indicators of financial stress or distress."},{label:"Business experience & reputation",detail:"Review regulatory history, litigation record, prior enforcement actions, customer complaints, and management team background."},{label:"Information security assessment",detail:"Review SOC 2 Type II reports, penetration test results, incident history, data classification practices, and subcontractor security posture."},{label:"Compliance program review",detail:"For BaaS: independently assess the fintech's AML/BSA program, CIP procedures, UDAP/UDAAP compliance, and complaint management."},{label:"Operational resilience",detail:"Evaluate business continuity and disaster recovery plans, recovery time objectives, and testing history."},{label:"Fourth-party mapping",detail:"Identify material subcontractors and sub-processors the third party relies on. Assess concentration in those sub-relationships.",proposed:true},{label:"AI-specific assessment",detail:"For AI vendors: review training data sources and vintage, bias testing methodology, explainability capability, model update frequency, and known failure modes.",proposed:true}],risks:[{level:"high",text:"Compliance delegation without verification — accepting the fintech's attestation of AML program quality without independent review"},{level:"high",text:"Fourth-party blindness — not knowing who the third party relies on (cloud providers, sub-processors, middleware)"},{level:"high",text:"AI opacity — deploying a black-box vendor system without understanding how outputs are generated or how errors are detected"},{level:"med",text:"SOC 2 over-reliance — treating SOC 2 Type II as a comprehensive compliance certification when it addresses only specified controls"},{level:"med",text:"Financial resilience gap — not stress-testing vendor viability under adverse scenarios"}],enforcement:"BaaS banks represented approximately 2% of all banks nationally but received 13.5% of severe enforcement actions in 2023. The common thread: risk signals present at the due diligence stage were not detected, were detected and not escalated, or were escalated and not acted upon.",examples:{baas:{title:"Riverton × PayFlow: Due Diligence",situation:"Riverton's TPRM Officer leads a 60-day diligence process on PayFlow. Independent counsel is engaged to review PayFlow's regulatory status; a specialized compliance consultant assesses PayFlow's BSA/AML program.",steps:["Financial review: PayFlow is Series B, $45M raised, burn rate of $600K/month. Runway: ~6 years. Concern: depends entirely on Riverton sponsorship revenue — single-source dependency.","Regulatory history: PayFlow has received two CFPB complaint bureau inquiries (resolved). No prior enforcement actions.","BSA/AML assessment: PayFlow uses a third-party KYC vendor for identity verification and a rules-based TM tool. Riverton's consultant finds: no SAR filing procedures, no independent AML testing. Critical gap.","Information security: SOC 2 Type II issued 6 months ago. Penetration test last conducted 18 months ago. Two open critical findings not yet remediated.","Fourth-party mapping: PayFlow's stack includes AWS (infrastructure), Stripe (payment rails), Verified Inc. (KYC), and a middleware API layer. All four are material.","Operational resilience: PayFlow's BCP has never been tested. RPO/RTO undefined for customer-facing applications."],redFlags:["No SAR procedures at a vendor handling gig-worker accounts is an automatic remediation requirement before launch.","Unremediated critical pentesting findings cannot be waived — require resolution prior to contract execution."]},core:{title:"First Meridian × NovaCore: Due Diligence",situation:"First Meridian engages a Big 4 firm to conduct technical due diligence on NovaCore's platform, architecture, and financial condition. Internal audit simultaneously reviews NovaCore's SOC 1 and SOC 2 reports.",steps:["Financial: NovaCore is privately held, PE-backed. Revenue growth of 40% YoY but EBITDA negative. Concern: may require additional capital raise within 24 months.","Technical assessment: Big 4 team conducts architecture review. Finding: NovaCore's multi-tenant cloud architecture uses shared infrastructure — data segregation controls need independent validation.","SOC 1 Type II review: 4 exceptions noted. Three are compensating-controlled; one relates to change management — flagged for contract remediation requirement.","Regulatory reporting capability: NovaCore's call report module has never been deployed for a bank over $1B in assets. First Meridian would be the largest client. Risk: untested at scale.","Fourth-party: NovaCore hosts on AWS GovCloud. Two sub-processors for fraud analytics. Both must be assessed.","Reference checks: 6 NovaCore client banks contacted. Common theme: implementation timeline consistently runs 6–9 months over projection."],redFlags:["Being NovaCore's largest client on an untested module is a material implementation risk — require contractual SLAs and milestone penalties.","PE-backed vendor with negative EBITDA: financial resilience clause required in contract."]},ai:{title:"Eastport × ClearTrace: Due Diligence",situation:"Eastport engages its newly hired model risk analyst plus an outside AI/ML consultant to conduct AI-specific due diligence on ClearTrace's transaction monitoring system.",steps:["Model documentation review: ClearTrace provides a 'model card' summarizing the architecture (gradient boosting + neural network ensemble). Training data: 3 years of transactions from 12 bank clients. Vintage: 2021–2023.","Bias assessment: ClearTrace's own testing shows a 22% higher false positive rate on transactions from money service businesses vs. retail customers.","Explainability: ClearTrace offers 'feature importance' outputs (top 5 factors per alert) but not transaction-level explanations. Model risk analyst flags: insufficient for SAR defense.","Update frequency: ClearTrace retrains the model quarterly. Banks are not individually notified of retraining events. Major gap.","Performance benchmarking: ClearTrace provides aggregate statistics across its client base but refuses to provide bank-specific backtesting.","Known failure modes: ClearTrace discloses that the model underperforms on structuring patterns involving cryptocurrency on-ramps — relevant and must be addressed."],redFlags:["Lack of notification on model retraining is non-negotiable — this is a model risk management baseline requirement.","Insufficient explainability for SAR decisions must be resolved contractually before deployment."]},data:{title:"Lakeside × Plume: Due Diligence",situation:"Lakeside's compliance and IT teams conduct a focused diligence on Plume, emphasizing data governance, consumer consent architecture, and privacy regulatory exposure.",steps:["Privacy review: Plume accesses customer data via screen scraping AND direct API connections. Screen scraping introduces credential security risk — Lakeside's legal team flags GLBA exposure.","Consumer consent: Plume's consent flow is embedded in the fintech app. The consent language does not adequately disclose that Plume may share aggregated data with third parties.","Data use: Plume's business model includes selling de-identified, aggregated transaction data to financial services firms. Lakeside's counsel flags potential FCRA and Reg P concerns.","SOC 2 Type II: Clean report. Only vendor with no notable exceptions in Lakeside's diligence process.","Regulatory posture: Plume has not assessed its Section 1033 compliance readiness. The data access method may require modification upon finalization.","Fourth-party: Plume uses two sub-processors for data normalization and one for analytics. All three handle Lakeside customer data."],redFlags:["Consent language that doesn't adequately disclose data monetization creates UDAP risk for Lakeside — must be remediated before integration.","Section 1033 readiness gap requires a contractual commitment from Plume to comply within 6 months of rule finalization."]}}},{id:"contract",number:"03",title:"Contract Negotiation",subtitle:"Terms that protect the bank",color:"#6ab0e0",guidance:"Banking organizations should have written contracts that clearly define the rights and responsibilities of all parties. Contracts with third parties involved in critical activities should address the nature and scope of the arrangement, performance measures, audit and inspection rights, ownership of data, confidentiality and integrity, business continuity obligations, default and termination provisions, dispute resolution, and applicable law.",guidanceCites:["FIL-29-2023 §IV(C)","OCC Bulletin 2013-29 (superseded)"],activities:[{label:"Scope & responsibilities",detail:"Define with precision what the third party will and will not do. Ambiguity here becomes liability later."},{label:"Performance benchmarks & SLAs",detail:"Establish measurable KPIs with defined consequences for non-performance. Avoid aspirational language."},{label:"Audit & inspection rights",detail:"Secure unconditional rights to audit the third party and its subcontractors. For AI vendors: include rights to access model documentation and performance data."},{label:"Data ownership & portability",detail:"Establish that the bank owns customer data. Define migration timelines and data return/destruction requirements."},{label:"Mandatory notification triggers",detail:"Require notification within defined timeframes (e.g., 72 hours) for regulatory actions, material breaches, financial distress, or key personnel changes."},{label:"Termination & step-in rights",detail:"Include clear termination rights, transition assistance obligations, and bank step-in rights upon vendor failure."},{label:"Consumer protection pass-through",detail:"For BaaS: require contract terms to flow consumer protection obligations to end customers as if they were the bank's direct customers."}],risks:[{level:"high",text:"Exit trap — long contract terms with limited termination rights and no transition assistance create bank dependency"},{level:"high",text:"Data hostage — no portability guarantee leaves customer data inaccessible upon termination or vendor failure"},{level:"high",text:"Audit gap — limited or conditional audit rights mean the bank cannot verify compliance during the relationship"},{level:"med",text:"Notification silence — no trigger requiring the vendor to notify the bank of its own regulatory troubles or financial distress"},{level:"med",text:"SLA theater — performance benchmarks without consequences are marketing commitments, not contractual obligations"}],enforcement:"The Synapse bankruptcy (2024) exposed what happens when custodial ledger reconciliation is not a contractual requirement. When Synapse's ledger became unreliable, neither the sponsor banks nor the fintech could determine how much each customer held. $96M in deposits were inaccessible to 200,000+ customers for months. This was a contract failure as much as an operational one.",examples:{baas:{title:"Riverton × PayFlow: Contract Negotiation",situation:"Riverton's counsel leads contract negotiation. PayFlow's standard contract is a 3-year agreement with auto-renewal. Riverton's team negotiates significant modifications.",steps:["Scope: Contract defines that PayFlow performs customer acquisition, UX, and first-line complaint handling. Riverton retains: account opening, BSA/AML compliance, SAR filing authority, dispute resolution final authority.","BSA/AML pass-through: Riverton requires a compliance exhibit requiring PayFlow to maintain a written AML program meeting Riverton's standards, subject to annual review.","Audit rights: Riverton obtains unconditional annual audit rights over PayFlow and its material subcontractors, including Verified Inc.","Notification triggers: PayFlow must notify Riverton within 48 hours of: any regulatory inquiry, complaint rate exceeding 2% in a quarter, data breach, or key compliance officer departure.","Termination: 90-day termination for convenience; 30-day termination for cause. PayFlow must provide 180 days of transition assistance at cost, not at margin.","Data: All customer account data is owned by Riverton. PayFlow must return all data within 30 days of termination and certify destruction within 60 days."],redFlags:["PayFlow initially proposed that audit rights were subject to 30-day advance notice and PayFlow's 'operational availability' — rejected. Unconditional audit rights are non-negotiable.","Auto-renewal clause removed entirely — Riverton requires affirmative board renewal decision annually."]},core:{title:"First Meridian × NovaCore: Contract Negotiation",situation:"NovaCore's standard contract is a 10-year SaaS agreement. First Meridian's legal team spends 4 months negotiating a substantially modified agreement.",steps:["Term: Reduced from 10 years to 5 years with two 2-year renewal options. Resolved by linking renewal pricing to CPI rather than NovaCore's list price increases.","SLAs: 99.95% uptime for core banking systems. Penalties: 10% monthly fee credit per 0.1% downtime below SLA. NovaCore's initial SLA was 99.5% — insufficient for a core processor.","Implementation milestone penalties: NovaCore must meet agreed project milestones. Failure triggers $50K/month penalty up to 10% of contract value.","Financial resilience clause: If NovaCore's revenue falls below a defined threshold or it initiates an equity raise, First Meridian receives 90-day notice and enhanced termination rights.","Regulatory reporting module: Must be independently validated by First Meridian's internal audit team before go-live. Deficiencies remediated at NovaCore's cost.","Data portability: Upon termination, NovaCore must deliver all data in a portable, industry-standard format within 45 days. Transition assistance: 12 months at contract rates."],redFlags:["NovaCore proposed 'regulatory changes' as a force majeure excuse for SLA non-performance — rejected. Regulatory compliance is NovaCore's baseline obligation.","NovaCore attempted to claim ownership of any custom configurations built for First Meridian — negotiated to bank ownership of all bank-specific configurations."]},ai:{title:"Eastport × ClearTrace: Contract Negotiation",situation:"Eastport's model risk analyst and counsel work together to build AI-specific contract provisions that ClearTrace has not seen in prior bank contracts.",steps:["Model documentation rights: Eastport receives full model documentation including training data description, architecture summary, validation methodology, and known limitations — updated with each material model change.","Retraining notification: ClearTrace must notify Eastport at least 30 days before any model retraining event. Eastport has the right to conduct parallel testing before adopting the new model version.","Explainability obligation: ClearTrace must provide, for each transaction alert: top contributing features, their magnitudes, and the threshold the transaction exceeded.","Performance benchmarking data: ClearTrace must provide Eastport with a quarterly performance report specific to Eastport's transaction population — not aggregated across clients.","Bank override right: Eastport retains explicit contractual authority to override or dismiss any ClearTrace alert without consequence.","Adverse outcome sharing: If an Eastport SAR is found to have been generated by a demonstrably erroneous model output, ClearTrace provides remediation support at no charge."],redFlags:["ClearTrace initially refused per-bank performance reporting, citing client confidentiality. Eastport's position: without bank-specific data, independent validation is impossible.","Model 'as-a-service' with no documentation rights would make Eastport unable to explain its SAR program to FinCEN. Non-starter."]},data:{title:"Lakeside × Plume: Contract Negotiation",situation:"Lakeside focuses contract negotiation on data governance, consent architecture, and the forthcoming Section 1033 regulatory environment.",steps:["Consent architecture: Plume must modify its consent flow to include explicit disclosure that Plume monetizes aggregated data, and that Lakeside customers can revoke consent at any time.","Data use restrictions: Plume is contractually prohibited from selling, licensing, or using Lakeside customer data in any individually identifiable form.","Screen scraping prohibition: Phased out within 18 months in favor of direct API connections.","Section 1033 compliance: Plume must certify Section 1033 compliance within 180 days of final rule publication. Failure triggers Lakeside's right to terminate without penalty.","Sub-processor obligations: All three Plume sub-processors are listed in a contract exhibit. Plume cannot add or substitute sub-processors without 30-day advance notice and Lakeside's approval.","Breach notification: 24-hour notification requirement for any suspected data breach involving Lakeside customer data."],redFlags:["Plume's initial contract included a clause allowing it to use customer data for 'product improvement' — an undefined term that could authorize de-anonymization. Struck entirely.","No sub-processor list in Plume's standard contract — Lakeside required full disclosure as a condition of execution."]}}},{id:"monitoring",number:"04",title:"Ongoing Monitoring",subtitle:"Continuous oversight throughout the relationship",color:"#e0c050",guidance:"Banking organizations should conduct ongoing monitoring of their third-party relationships throughout the life of the relationship. Monitoring activities should be commensurate with the level of risk and complexity of the relationship and should include reviewing and analyzing reports and information provided by the third party, monitoring for changing conditions that may affect the third party's risk profile, reviewing the third party's financial condition, assessing the third party's compliance with applicable laws and regulations, and evaluating the third party's business continuity and information security.",guidanceCites:["FIL-29-2023 §IV(D)","FFIEC IT Handbook (Outsourcing Technology Services)"],activities:[{label:"Performance reporting review",detail:"Review SLA performance reports. Validate reported metrics against bank-side data where possible. Investigate discrepancies."},{label:"Financial condition monitoring",detail:"For critical vendors: quarterly review of available financial indicators (audited statements, PE fund health, press coverage, credit agency signals)."},{label:"Compliance surveillance",detail:"For BaaS: monthly review of fintech's CIP/KYC logs, complaint volumes, SAR filing patterns, and escalation queue."},{label:"Independent audit execution",detail:"Execute audit rights at the frequency specified in the contract. Do not allow audit rights to expire unused."},{label:"Incident & escalation review",detail:"Review all contractual notifications received. Maintain a tracking log. Ensure escalations are resolved within defined timeframes."},{label:"AI model performance monitoring",detail:"For AI vendors: monthly performance benchmarking, quarterly bias/disparate impact testing, annual independent revalidation.",proposed:true},{label:"Fourth-party surveillance",detail:"Monitor for material changes to the third party's own subcontractors — acquisitions, failures, regulatory actions."}],risks:[{level:"high",text:"Monitoring frequency mismatch — annual reviews for BaaS arrangements with daily consumer-facing transactions"},{level:"high",text:"Model drift blindness — AI system performance degrades between reviews without detection"},{level:"high",text:"Complaint signal neglect — rising fintech complaint volumes are early warning signals that often precede enforcement actions"},{level:"med",text:"Audit rights unused — contractual audit rights expire or are repeatedly deferred, negating their value"},{level:"med",text:"Fourth-party cascade — monitoring focuses on the direct vendor while its own supply chain experiences material disruption"}],enforcement:"The BaaS enforcement wave of 2023–2024 revealed a pattern: banks with monthly compliance monitoring detected problems early and self-reported. Banks relying on annual reviews discovered the same problems through examination — a materially worse outcome. Monitoring frequency is not a formality; it determines whether the bank controls its own narrative.",examples:{baas:{title:"Riverton × PayFlow: 14 Months In",situation:"Riverton has been live with PayFlow for 14 months. Account volumes have grown to 67,000. Riverton's BaaS compliance team conducts structured monthly reviews.",steps:["Monthly dashboard: PayFlow provides a monthly compliance report including new account volume, CIP pass/fail rates, suspicious activity referrals, dispute volumes, and complaint counts.","Month 11 flag: Complaint rate spikes to 3.2% (above contractual 2% threshold). Cause: PayFlow changed its dispute resolution timeline without notifying Riverton. Notification breach + SLA breach documented.","Month 13 flag: PayFlow's BSA team refers 247 transactions for SAR review in a single week — 6x the prior weekly average. Emergency review initiated: a subset of accounts are being used to structure cannabis business proceeds.","Quarterly audit: Riverton's compliance team conducts on-site review of PayFlow's CIP procedures. Finding: PayFlow's ID verification vendor has a 12% exception rate on government ID verification for international users.","Financial monitoring: PayFlow raises Series C ($80M). New investor includes a PE fund with prior fintech investments that failed regulatory review — flagged for senior management review.","Fourth-party: Verified Inc. is acquired by a foreign firm. Riverton invokes its contract right to assess the new ownership structure before continuing to accept Verified Inc. as an approved subcontractor."],redFlags:["The structuring pattern in Month 13 required 247 referrals before the pattern was visible. Real-time monitoring would have surfaced it at 40.","PayFlow's failure to notify on the Verified Inc. acquisition is a material contract breach — documented and addressed in the quarterly business review."]},core:{title:"First Meridian × NovaCore: Year 2",situation:"First Meridian is 8 months post go-live on NovaCore. Implementation ran 5 months over schedule. The bank is now in steady-state monitoring.",steps:["SLA tracking: NovaCore has achieved 99.91% uptime — below the 99.95% SLA in 3 of the past 6 months. Monthly fee credits have been issued.","Regulatory reporting validation: Internal audit validates NovaCore's call report module quarterly. Month 7: $2.1M discrepancy in held-to-maturity securities classification. NovaCore remediates within 10 days.","Financial monitoring: NovaCore's PE sponsor announces a portfolio restructuring. First Meridian activates the financial resilience monitoring protocol — requests audited financials under contract rights.","Incident: NovaCore experiences a 4-hour outage during business hours. NovaCore's RTO was 2 hours — missed by 2 hours. Documented breach.","Change management: NovaCore deploys a platform update affecting transaction processing logic. First Meridian was notified 48 hours in advance, not the contractual 14 days. Formal notice of breach sent.","Annual third-party audit: Internal audit conducts on-site visit to NovaCore's data center. Prior SOC 2 finding (change management exception) has been partially remediated — one sub-control still open."],redFlags:["Three consecutive months below SLA + a 4-hour outage constitute a pattern that triggers the enhanced monitoring protocol — escalated to CRO.","The open SOC 2 sub-control must have a documented remediation timeline or triggers First Meridian's right to require an independent assessment."]},ai:{title:"Eastport × ClearTrace: Quarterly Model Review",situation:"Eastport is 9 months into deployment. Its model risk analyst conducts the first full quarterly performance review.",steps:["Alert volume: ClearTrace generated 1,847 alerts in Q3. Eastport's BSA team filed 23 SARs (1.2% conversion rate). False positive rate: 98.8%. Baseline from prior rule-based system: 94%. Improvement within expected range.","Bias testing: Disparate impact analysis on Q3 alert data. Finding: the model flags MSB-designated account transactions at 3.1x the rate of non-MSB retail accounts after controlling for transaction amount. Requires documentation.","Model drift check: Alert score distribution has shifted — average alert score has risen by 0.08 sigma. Potential drift from a change in Eastport's customer mix.","Retraining notification: ClearTrace provides 30-day advance notice of Q4 retraining event. Eastport's model risk analyst requests the updated model card and conducts parallel testing for 2 weeks before adoption.","Explainability audit: BSA Officer randomly samples 20 SARs filed in Q3. Confirms that each has a documented ClearTrace explanation package in the SAR workpaper. All 20 pass.","Override tracking: Eastport's BSA team overrode 312 ClearTrace alerts in Q3 (17% of total). Overrides concentrated in a specific transaction type (intra-family remittances). Suggests adding a rule-based exclusion."],redFlags:["The 3.1x MSB alert rate requires documentation in Eastport's fair lending and BSA risk assessment — even if not discriminatory, examiners will ask about it.","A 17% override rate on a specific transaction type indicates a model blind spot — documented and referred to ClearTrace for retraining consideration."]},data:{title:"Lakeside × Plume: 18-Month Review",situation:"Plume's PFM tool has 8,400 enrolled Lakeside customers. Lakeside's compliance team conducts its annual review and a triggered review following a Plume system incident.",steps:["Annual compliance review: Lakeside's privacy counsel reviews Plume's updated privacy policy — finds new language authorizing use of location data for 'service personalization.' Not authorized under the contract. Formal notice sent; Plume retracts the language.","Section 1033: CFPB finalizes the Section 1033 rule. Plume confirms the API-based data access model already complies; screen scraping was phased out in Month 15 as required.","Incident: Plume experiences a sub-processor data breach (analytics vendor) affecting 340 Lakeside customer records. Plume notifies Lakeside within 18 hours — within the 24-hour contractual window.","Consent monitoring: Lakeside samples 100 enrolled customers and reviews consent records. All 100 have valid, dated consent records. Consent revocation tested — all 5 test cases processed within 22 hours.","Sub-processor change: Plume requests approval to substitute its data normalization sub-processor. Lakeside invokes the 30-day review right and reviews the new sub-processor's SOC 2 before approving.","Complaint analysis: 12 Lakeside customers have complained to Plume about PFM data inaccuracies. Plume resolved 10; 2 escalated to Lakeside. Resolution quality reviewed and found adequate."],redFlags:["The sub-processor breach is the first test of the incident response protocol — it worked, but the 18-month gap in sub-processor security re-review is a monitoring gap to close.","Plume's unauthorized privacy policy update is a material contract breach — documented and addressed with a formal corrective action plan."]}}},{id:"termination",number:"05",title:"Termination & Exit",subtitle:"Ending relationships safely",color:"#d06060",guidance:"Banking organizations should develop contingency plans for when third-party relationships are terminated or fail. For critical activities, plans should address how the banking organization would continue to operate in the absence of the third party, how it would protect customer information, and how it would manage the transition. Termination provisions should be included in contracts and should address transition assistance, data return and destruction, and the obligations of each party upon termination.",guidanceCites:["FIL-29-2023 §IV(E)","2024 Joint Statement on Bank-Fintech Arrangements"],activities:[{label:"Pre-termination planning",detail:"Maintain a current, tested exit plan for all Tier 1 relationships. Do not develop exit plans only when termination becomes imminent."},{label:"Custodial reconciliation (BaaS)",detail:"For deposit-related BaaS arrangements: require full reconciliation of custodial accounts before termination is finalized. Every dollar must be accounted for."},{label:"Customer notification",detail:"Notify affected customers within a defined timeframe. Communicate clearly what changes they will experience and what actions they need to take."},{label:"Data disposition",detail:"Obtain data return in portable format within the contractual timeline. Obtain destruction certification from the third party for any data not returned."},{label:"Substitute vendor or wind-down",detail:"If the relationship is terminated due to vendor failure, the bank must have a substitute vendor identified or a credible in-house wind-down pathway."},{label:"Regulatory notification",detail:"For critical third-party relationship terminations, notify the primary federal regulator within a defined timeframe. Do not allow regulators to learn of material changes through examination."},{label:"Post-exit review",detail:"Conduct a lessons-learned review after every Tier 1 termination. Document what worked, what failed, and update TPRM framework accordingly."}],risks:[{level:"high",text:"Custodial ledger gap — inability to reconcile customer funds upon termination (the Synapse scenario)"},{level:"high",text:"Data inaccessibility — customer data held by a failed vendor is not returned in a portable format"},{level:"high",text:"Customer harm — customers left without access to their accounts or funds during transition"},{level:"med",text:"Transition assistance non-performance — vendor fails to provide contractual transition support, especially in adversarial terminations"},{level:"med",text:"Regulatory surprise — examiners discover a critical relationship termination through examination rather than proactive notification"}],enforcement:"The Synapse bankruptcy (May 2024) left 200,000+ customers unable to access their funds for months. The core failure: no reliable custodial ledger. The 2024 Joint Statement on Bank-Fintech Arrangements is a direct regulatory response — expect termination and reconciliation planning to be primary examination topics.",examples:{baas:{title:"Riverton × PayFlow: Termination (Month 28)",situation:"PayFlow receives a CFPB civil investigative demand related to its customer complaint handling. Riverton's board invokes the regulatory action termination right. A 30-day termination notice is issued.",steps:["Day 1: Riverton's TPRM Officer activates the BaaS Exit Protocol. The documented exit plan — required before go-live and updated annually — is reviewed.","Day 3: Riverton's BSA team freezes all new account openings under the PayFlow program. Existing 71,000 accounts remain active during transition.","Day 7: Riverton requests a full custodial ledger reconciliation from PayFlow. A $340K discrepancy is found — 12 accounts with balances not matching PayFlow's records. Resolved within 5 business days: data entry error.","Day 10: Riverton notifies the FDIC Regional Office of the termination and its cause. Provides timeline and transition plan.","Day 14: Customer notification letters sent to all 71,000 accountholders explaining the transition timeline, their options, and that their deposits remain FDIC-insured.","Day 75: PayFlow provides certified destruction notice for all Riverton customer data. Day 90: Post-exit review finds the $340K discrepancy would have been $2.1M+ if reconciliation had not been a pre-termination contractual requirement."],redFlags:["Had Riverton not required a custodial reconciliation before termination, the $340K discrepancy might have been discovered only after customers complained about missing balances.","PayFlow initially resisted the accelerated timeline. Riverton's contractual right to self-execute the migration over PayFlow's objection was invoked on Day 45."]},core:{title:"First Meridian × NovaCore: Non-Renewal (Year 5)",situation:"First Meridian elects not to renew its NovaCore contract. A transition to a competing core processor begins 18 months before contract expiration.",steps:["Month −18: First Meridian selects successor core processor (BankOS). NovaCore is notified of non-renewal intent. The 12-month transition assistance period at contract rates begins.","Month −15: Data mapping exercise initiated. NovaCore's data format is proprietary; BankOS requires conversion. NovaCore provides data dictionary under contractual obligation.","Month −9: Parallel processing begins. First Meridian runs both cores simultaneously on a subset of test accounts. NovaCore is contractually required to cooperate.","Month −6: Internal audit validates data integrity between NovaCore export and BankOS import on 100% of loan records. 99.7% match. 0.3% (date format discrepancies) corrected in conversion layer.","Month −3: Call report validation — First Meridian's team validates that BankOS generates identical regulatory report outputs to NovaCore on prior-period data.","Month 0: NovaCore cutover. 72-hour blackout window. Month +2: NovaCore provides certified data destruction notice. Post-exit: 18-month transition timeline was adequate but required NovaCore's full cooperation — the contractual transition assistance obligation was the critical enabler."],redFlags:["Had NovaCore's original 10-year contract term been accepted, First Meridian would have had no exit option at Year 5 without significant penalty.","Data format lock-in is a real risk — First Meridian required 3 months of NovaCore engineering time to produce a portable export. Banks with weaker contract rights would have faced obstruction."]},ai:{title:"Eastport × ClearTrace: Termination for Cause (Month 19)",situation:"ClearTrace's Q4 retraining produces a model that Eastport's revalidation finds materially underperforms the prior version. Eastport invokes the model performance termination clause.",steps:["The trigger: Post-retraining parallel testing shows the new ClearTrace model has a 34% lower recall on structuring patterns in Eastport's transaction history. Eastport's model risk analyst recommends immediate rollback.","ClearTrace disputes the finding. Eastport invokes the contractual dispute resolution process — a 30-day remediation period during which ClearTrace must restore prior performance or provide a materially improved model.","Day 35: ClearTrace fails to meet the performance threshold. Eastport exercises its model performance termination right. 60-day wind-down notice issued.","Parallel deployment: Eastport activates its legacy rule-based TM system (retained as fallback) during the wind-down. ClearTrace is required by contract to continue providing full service during the notice period.","Regulatory notification: Eastport notifies its FDIC examiner of the transition. Explains the performance basis, the validation process, and the fallback plan. Examiner acknowledges.","Post-exit: Eastport conducts a 90-day evaluation process for a replacement AI TM vendor. The evaluation RFP includes Eastport's full model performance requirements as contract minimums."],redFlags:["Without the contractual model performance termination clause, Eastport would have been locked into a degraded AI system with no exit mechanism until contract expiration.","The fallback system was the critical safety net — banks that fully decommission prior systems before AI vendor deployment have no recovery option if the AI fails."]},data:{title:"Lakeside × Plume: Regulatory Exit (Month 22)",situation:"Plume's parent company is acquired by a large data broker. Lakeside's board determines the new ownership creates unacceptable data monetization risk and terminates the relationship.",steps:["Trigger: Plume's parent is acquired by DataXchange Corp., a large consumer data monetization firm. Lakeside's privacy counsel advises that the acquisition materially changes Plume's data use risk profile.","Lakeside invokes the ownership change notification provision. Lakeside's board votes to terminate under the material change clause.","Day 1: API connections to Plume are suspended. PFM feature is disabled in Lakeside's mobile app. Customer notification goes out within 24 hours.","Day 7: Lakeside requests full deletion of all Lakeside customer data from Plume's systems and its three sub-processors. Plume provides a deletion timeline: 45 days.","Day 45: Plume provides certified deletion notice covering Lakeside customer data across all systems and sub-processors. Lakeside's privacy counsel reviews and accepts.","Post-exit: 8,400 enrolled customers lose PFM functionality. Lakeside offers a 6-month fee waiver on premium accounts. No customer data was compromised. TPRM framework updated to include change-of-control as an automatic trigger for enhanced monitoring in all Tier 1 and Tier 2 vendor contracts."],redFlags:["A data aggregator acquired by a data monetization firm is a textbook scenario for requiring a change-of-control termination right — Lakeside's prior contract negotiation made the clean exit possible.","The 45-day deletion timeline for sub-processors is the industry weak point. Lakeside's contract required certification from each sub-processor individually."]}}}];

let activeStage=0,activeScenario="baas",activeTab="example",expandedAct=null;
const riskColors={high:"#d06060",med:"#c9a84c",low:"#4a9fd4"};
const riskLabels={high:"High",med:"Moderate",low:"Low"};

function buildScenarioBar(){
  document.getElementById('scenario-bar').innerHTML=SCENARIOS.map(s=>`<button class="scenario-btn ${s.id===activeScenario?'active':''}" onclick="selectScenario('${s.id}')"><span style="font-size:13px">${s.icon}</span>${s.label}</button>`).join('');
}

function buildStageNav(){
  document.getElementById('stage-nav').innerHTML=STAGES.map((s,i)=>`<div class="stage-node ${i===activeStage?'active':''}" onclick="selectStage(${i})"><div class="s-num">STAGE ${s.number}</div><div class="s-title">${s.title}</div><div class="s-bar" style="background:${i===activeStage?s.color:'transparent'}"></div></div>`).join('');
}

function buildFooter(){
  document.getElementById('progress-segs').innerHTML=STAGES.map((s,i)=>`<div class="progress-seg ${i<=activeStage?'active-or-before':''}" style="background:${i<=activeStage?s.color:'#1e3a6e'}" onclick="selectStage(${i})"></div>`).join('');
  document.getElementById('footer-count').textContent=`${activeStage+1} / ${STAGES.length}`;
}

function buildContent(){
  const stage=STAGES[activeStage];
  const example=stage.examples[activeScenario];
  const sc=SCENARIOS.find(s=>s.id===activeScenario);
  const wrap=document.getElementById('content-wrap');
  wrap.style.animation='none'; wrap.offsetHeight; wrap.style.animation='';
  wrap.innerHTML=`
    <div class="stage-header">
      <div class="s-eyebrow">STAGE ${stage.number} OF ${STAGES.length} · ${stage.subtitle.toUpperCase()}</div>
      <h2 style="color:${stage.color}">${stage.title}</h2>
      <div class="s-subtitle">${stage.subtitle}</div>
    </div>
    <div class="guidance-box">
      <div class="g-label">Interagency Guidance</div>
      <p>${stage.guidance}</p>
      <div class="cites">${stage.guidanceCites.join(' · ')}</div>
    </div>
    <div id="tabs">
      <button class="tab-btn ${activeTab==='example'?'active':''}" onclick="selectTab('example')">Example</button>
      <button class="tab-btn ${activeTab==='activities'?'active':''}" onclick="selectTab('activities')">Key Activities</button>
      <button class="tab-btn ${activeTab==='risks'?'active':''}" onclick="selectTab('risks')">Risk Signals</button>
    </div>
    <div class="tab-panel ${activeTab==='example'?'active':''}" id="panel-example">
      <div class="example-title">Scenario: ${sc.label} · ${sc.desc}</div>
      <div class="example-scenario-title">${example.title}</div>
      <div class="example-situation">${example.situation}</div>
      <div class="example-steps">${example.steps.map((step,i)=>`<div class="example-step"><span class="step-num">${String(i+1).padStart(2,'0')}</span><span class="step-text">${step}</span></div>`).join('')}</div>
      <div class="red-flags-section">
        <div class="rf-label">Red Flags at This Stage</div>
        <ul>${example.redFlags.map(r=>`<li>${r}</li>`).join('')}</ul>
      </div>
    </div>
    <div class="tab-panel ${activeTab==='activities'?'active':''}" id="panel-activities">
      <div class="activities-label">Key Activities at This Stage</div>
      <div class="activity-list">${stage.activities.map((a,i)=>`<div class="activity-row" onclick="toggleActivity(${i})" id="act-${i}"><div class="activity-header"><span class="activity-dot" style="background:${stage.color}"></span><span class="activity-name">${a.label}${a.proposed?'<span class="proposed-tag">PROPOSED</span>':''}</span><span class="activity-toggle" id="act-toggle-${i}">▾</span></div><div class="activity-detail" id="act-detail-${i}"><p>${a.detail}</p></div></div>`).join('')}</div>
    </div>
    <div class="tab-panel ${activeTab==='risks'?'active':''}" id="panel-risks">
      <div class="risks-label">Risk Signals at This Stage</div>
      <div class="risk-list">${stage.risks.map(r=>`<div class="risk-item" style="border:1px solid ${riskColors[r.level]}30;border-left:3px solid ${riskColors[r.level]}"><span class="risk-badge" style="color:${riskColors[r.level]};background:${riskColors[r.level]}15;border:1px solid ${riskColors[r.level]}40">${riskLabels[r.level]}</span><p class="risk-text">${r.text}</p></div>`).join('')}</div>
      <div class="enforcement-box"><div class="e-label">Enforcement Context</div><p>${stage.enforcement}</p></div>
    </div>`;
  if(expandedAct!==null){
    const d=document.getElementById(`act-detail-${expandedAct}`);
    const t=document.getElementById(`act-toggle-${expandedAct}`);
    if(d)d.style.display='block';
    if(t)t.style.transform='rotate(180deg)';
  }
}

function selectStage(i){activeStage=i;activeTab="example";expandedAct=null;buildStageNav();buildContent();buildFooter();}
function selectScenario(id){activeScenario=id;activeTab="example";buildScenarioBar();buildContent();}
function selectTab(tab){activeTab=tab;expandedAct=null;buildContent();}
function toggleActivity(i){
  const d=document.getElementById(`act-detail-${i}`);
  const t=document.getElementById(`act-toggle-${i}`);
  if(!d)return;
  if(expandedAct===i){d.style.display='none';t.style.transform='none';expandedAct=null;}
  else{
    if(expandedAct!==null){
      const pd=document.getElementById(`act-detail-${expandedAct}`);
      const pt=document.getElementById(`act-toggle-${expandedAct}`);
      if(pd)pd.style.display='none';if(pt)pt.style.transform='none';
    }
    d.style.display='block';t.style.transform='rotate(180deg)';expandedAct=i;
  }
}

buildScenarioBar();buildStageNav();buildContent();buildFooter();
</script>
</body>
</html>
