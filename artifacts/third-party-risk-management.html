// ── DORA FRAMEWORK ────────────────────────────────────────────────────────────
const DORA = {
overview: “The EU Digital Operational Resilience Act (DORA) — effective January 2025 — is broader and more prescriptive than U.S. interagency guidance. While U.S. regulators take a ‘technology-neutral’ approach and do not mandate specific architectures, DORA requires financial institutions to ensure their entire supply chain — including all ICT service providers — meets strict resilience standards. DORA is increasingly influencing global best practices, and U.S. banks with EU operations or EU-parent affiliates must comply.”,
comparison: [{
dimension: “Scope”,
us: “Third-party relationships; principles-based, commensurate with risk”,
eu: “All ICT service providers; prescriptive, no materiality threshold”
}, {

eu: “Direct ICT supply chain oversight required for critical providers; concentration risk reports mandated”
}, {

us: “Evidence of testing and historical performance expected”,
eu: “Annual resilience testing for critical ICT providers; threat-led penetration testing (TLPT) required”
}, {
dimension: “Incident Report”,
us: “72-hour breach notification; no unified regulatory reporting format”,
eu: “4-hour initial report; 72-hour full report; 1-month final report — to a single EU supervisory authority”
}, {
dimension: “Cloud/AI”,
us: “Technology-neutral; no specific cloud architecture mandated”,
eu: “Cloud and AI providers explicitly included; concentration risk in cloud hyperscalers specifically addressed”
}, {
dimension: “Contracts”,
us: “Guidance on key provisions; no mandatory minimum clause list”,
eu: “Mandatory contractual provisions for all critical ICT providers; standardized contract templates encouraged”
}],
paradigm_shift: “Modern TPRM is moving from ‘preventing all failures’ toward ‘resilient recovery.’ In a complex, multi-cloud environment, some degree of third-party failure is inevitable. Resilient institutions build operational buffers: secondary vendor relationships, staff training on manual workarounds, and scenario testing that simulates total outage of critical vendors. This paradigm shift — from protection to recovery — is DORA’s most important contribution to global TPRM thinking.”
};

text: “Modern TPRM is moving from ‘preventing all failures’ toward ‘resilient recovery.’ In a complex, multi-cloud environment, some degree of third-party failure is inevitable. Resilient institutions build operational buffers by maintaining relationships with secondary vendors and training staff on manual workarounds for automated processes. For critical vendors, this includes annual scenario testing where the bank simulates a total outage to test its internal response capability — a practice DORA mandates and U.S. examiners are increasingly requiring.”

{term:‘FIL-29-2023 — Interagency Guidance on Third-Party Relationships’,color:C.gold,def:‘The June 2023 joint guidance issued by the FDIC, Federal Reserve, and OCC replacing prior agency-specific guidance (OCC 2013-29, FDIC FIL-44-2008, Fed SR 13-19). It establishes a unified lifecycle framework and articulates the foundational principle that while a bank may delegate the performance of an activity, it cannot delegate its underlying legal and regulatory responsibility. It is intentionally principles-based — defining what banks must do without prescribing how, which created the interpretive divergence that contributed to the BaaS enforcement wave.’},
{term:‘CFES STARC — Coalition for Financial Ecosystem Standards’,color:C.goldMid,def:‘The CFES developed the STARC (Standards, Assessment, Rating, and Certification) framework to operationalize FIL-29-2023 into measurable, audit-ready criteria. Released March 2025. Covers 54 core standards across six domains: BSA/AML, Compliance Management, TPRM, Operational Risk, Complaint Handling, and Marketing/Product Compliance. A seventh domain — the Lending Module — adds seven critical areas for credit partnerships. Five-level maturity scale: L1 (Optimized) → L5 (Rudimentary). Critical-tier vendors should reach Level 3 minimum before go-live.’},
{term:‘Banking as a Service (BaaS)’,color:C.gold,def:‘A model in which a licensed, FDIC-insured bank provides its regulated infrastructure — its charter, balance sheet, and access to payment networks — to non-bank entities via APIs, enabling those entities to offer financial products under their own brand without obtaining a banking license. The bank is the legal issuer, deposit holder, and regulatory accountable party. The fintech is the customer-facing entity. This inversion — where the fintech sees the consumer and the bank sees only the fintech — is the structural source of most BaaS compliance failures.’},
{term:‘FBO Account — For Benefit Of’,color:C.teal,def:‘A legal account structure in which a bank holds funds in a single omnibus account on behalf of many end users (the fintech's customers), with individual user balances tracked in a sub-ledger maintained by the fintech or its middleware provider. The FBO structure makes BaaS deposit programs operationally feasible at scale. It is also what created the Synapse failure: when Synapse's sub-ledger diverged from the banks' core systems and no party could reconcile them, $85–100M in customer funds became inaccessible.’},
{term:‘The Three-Ledger Problem’,color:C.teal,def:‘The reconciliation challenge unique to BaaS deposit arrangements using FBO account structures. Three separate records must be kept continuously synchronized: (1) Bank Core system — the authoritative FBO account balance; (2) Middleware Sub-ledger — how the omnibus balance is allocated across fintech programs; (3) Fintech App Ledger — the individual user-facing balance. Daily triangular reconciliation is now the regulatory baseline under the FDIC proposed custodial deposit rule. The absence of this reconciliation was the specific operational failure that produced the Synapse collapse.’},
{term:‘Nth-Party Risk’,color:’#8a80d4’,def:‘The risk arising from a bank's indirect exposure to the vendors of its vendors. A fourth party is a vendor or subcontractor of the bank's direct third-party relationship. A fifth party is a vendor of that fourth party. In 2023, approximately 84% of financial institutions were exposed to at least one fourth-party data breach. The Big Three cloud hyperscalers (AWS, Azure, GCP) control ~63% of global cloud market share, creating systemic concentration risk: a single AWS outage can simultaneously affect a bank's core processor, KYC vendor, fintech partner, and fraud monitoring system.’},
{term:‘DORA — EU Digital Operational Resilience Act’,color:’#5a80d4’,def:‘Effective January 2025. Broader and more prescriptive than U.S. interagency guidance: applies to all ICT service providers, mandates specific contractual provisions, requires threat-led penetration testing (TLPT) for critical providers, and establishes a standardized incident reporting timeline (4-hour initial → 72-hour full → 1-month final). Increasingly influencing global TPRM best practices. The paradigm it introduces — shifting from “preventing all failures” to “resilient recovery” — is the most important conceptual contribution to modern TPRM.’},
{term:‘True Lender Doctrine’,color:C.danger,def:‘A legal doctrine applied by state courts and regulators to determine which party — the bank or the fintech — is the actual lender in a bank-fintech lending partnership. If a court finds the fintech is the true lender, the bank's charter-based preemption of state usury laws does not apply to those loans. Most acute in arrangements where the fintech controls underwriting, holds the economic interest, and markets the product under its own brand.’},
{term:‘SR 11-7 — Model Risk Management Guidance’,color:’#d4905a’,def:‘The Federal Reserve's 2011 Supervisory Guidance on Model Risk Management (SR 11-7 / OCC 2011-12). Defines a “model” as any quantitative method, system, or approach that applies statistical, economic, financial, or mathematical theory to transform inputs into quantitative estimates. Requires independent validation, ongoing monitoring, governance documentation, and effective challenge of model outputs. For TPRM: applies to any vendor-supplied AI or algorithmic system that generates outputs informing bank decisions, regardless of whether the model was built in-house or purchased.’},
{term:‘BNPL — Buy Now Pay Later’,color:C.teal,def:‘A consumer credit product splitting a purchase into a series of installment payments. In a bank-fintech BNPL arrangement, the bank is typically the credit issuer (regulated lender) while the fintech is the servicer, underwriter, and merchant integrator. Subject to Regulation Z for loans with more than 4 installments, state installment lending licensing, and CFPB supervisory oversight.’},
{term:‘UDAP / UDAAP’,color:C.teal,def:‘Unfair, Deceptive, or Abusive Acts or Practices. UDAP (FTC Act §5) applies to all businesses. UDAAP (Dodd-Frank §1031) applies to CFPB-supervised entities. In BaaS, FDIC insurance misrepresentation and hidden fees in fintech products are the most common predicates.’},
{term:‘SOC 2 Type II’,color:’#8a80d4’,def:‘A System and Organization Controls report covering a period of time, providing an opinion on whether described controls operated effectively. Critical limitation: SOC 2 only covers the controls the vendor chose to include in its scope; carved-out subservice organizations are excluded and must be assessed separately. Provides no assurance about BSA/AML compliance, fair lending compliance, or the adequacy of the vendor's own vendor management program.’},
{term:‘BSA / AML’,color:C.teal,def:‘The Bank Secrecy Act (31 U.S.C. §5311 et seq.) is the primary U.S. anti-money laundering statute. Requires financial institutions to maintain AML programs comprising: a system of internal controls; independent testing; a designated compliance officer; ongoing employee training; and customer due diligence (CDD). Banks must file Suspicious Activity Reports (SARs) with FinCEN and Currency Transaction Reports (CTRs) for cash transactions exceeding $10,000. In BaaS: the BSA obligation is entirely non-delegable. The fintech's MSB-level AML obligations are less stringent than the bank's comprehensive requirements — that gap is the most common predicate in BaaS enforcement actions.’},
],

// ── STRUCTURAL DIFF TEXT ────────────────────────────────────────────────────────
const STRUCTURAL_DIFFS = {
‘baas-core’: ‘The BaaS deposit program inverts the traditional oversight architecture: the bank provides its charter as infrastructure for the fintech's customer relationship, while the Core Processor relationship keeps the bank at the center of its own operations. In BaaS, the fintech sees the consumer; the bank sees only the fintech. In core outsourcing, the bank remains the only customer-facing entity — the vendor is a back-office dependency. The compliance, reconciliation, and exit obligations are structurally different in kind, not just degree.’,
‘baas-ai’: ‘Both relationships involve algorithmic risk, but the accountability architecture differs fundamentally. In BaaS, the fintech's AML program is delegated but non-delegable — the bank owns the BSA obligation regardless of who performs it. In the AML AI vendor relationship, the bank's own compliance program is the customer of the AI system. The vendor supplies tools; the bank remains the BSA officer. In BaaS, the bank is accountable for what the fintech does to its customers. In AI monitoring, the bank is accountable for what the model tells its own staff.’,
‘baas-regtech’: ‘The BaaS relationship exports the bank's charter to the fintech's customers. The RegTech/KYC relationship imports the vendor's compliance tooling into the bank's own onboarding process. One is outward-facing (the bank's regulatory capacity distributed to third-party consumers), the other is inward-facing (vendor technology enhancing the bank's own compliance execution). The consumer confusion risk, the three-ledger problem, and the servicer continuity obligation are BaaS-specific — they have no analogue in a RegTech relationship.’,
‘baas-bpo’: ‘The BaaS program creates a customer population the bank has never directly served — the fintech's end users who hold accounts at the bank through the fintech's interface. The BPO relationship serves the bank's own existing customers through a delegated channel. In BaaS, the fintech controls the customer experience; the bank controls the regulatory liability. In BPO, the bank retains the customer relationship; the vendor controls the service delivery. The scope of consumer harm and the nature of the regulatory exposure are fundamentally different.’,
‘lending-core’: ‘The AI Lending partnership places the bank in the position of named originator for credit decisions it did not make — the AI model underwrites, and the bank issues. The Core Processor relationship keeps the bank in control of every function it has outsourced. In lending, the bank's fair lending, ECOA, and TILA obligations attach to decisions made by a model it does not own. In core outsourcing, the bank retains every compliance function; the vendor merely executes the bank's own processes.’,
‘lending-ai’: ‘Both relationships involve AI systems making consequential decisions, but the consumer-facing stakes differ. The AI lending model determines whether consumers receive credit — a fair lending and ECOA obligation with direct consumer harm potential. The AML AI model determines which transactions are referred for suspicious activity review — a BSA obligation with regulatory, not consumer, harm as the primary risk. Both require SR 11-7-style validation; the lending model additionally requires fair lending testing and adverse action notice infrastructure.’,
‘lending-regtech’: ‘The AI lending model makes credit decisions that determine consumer access to financial products. The RegTech/KYC platform makes identity verification decisions that determine consumer access to bank accounts. Both create disparate access risk if their models are biased against protected groups. But the lending model operates under ECOA/Reg B's adverse action notice requirements, while the identity verification platform operates under UDAP's disparate access framework. The regulatory toolkit for challenging each type of algorithmic bias is materially different.’,
‘lending-bpo’: ‘The AI lending fintech performs the bank's underwriting function — a credit risk and fair lending responsibility. The Contact Center BPO performs the bank's customer service function — a regulatory and reputational responsibility. The lending relationship creates regulatory liability for credit decisions; the BPO relationship creates regulatory liability for customer interactions. The compliance architecture, the examiner's focus, and the enforcement exposure are different in every material respect.’,
‘bnpl-core’: ‘The BNPL arrangement makes the bank the issuer of credit obligations it does not service — the fintech originates, services, and operates the program while the bank holds the charter liability. The Core Processor relationship makes the bank dependent on a vendor for operational execution but keeps the bank in control of its own customer relationships. In BNPL, the bank's servicer may become insolvent, leaving the bank as the surviving issuer of a portfolio with no operational capacity. In core outsourcing, the bank loses operational capacity itself during an outage but retains its customer relationships.’,
‘bnpl-ai’: ‘Both relationships create consumer-facing compliance obligations that rest with the bank. BNPL's Regulation Z, state licensing, and CFPB oversight create disclosure and credit compliance obligations tied to each individual loan. The AML AI vendor creates a BSA compliance obligation tied to each suspicious transaction determination. In BNPL, the consumer is the regulatory subject; in AML monitoring, FinCEN and the bank's own SAR program are the regulatory audience.’,
‘bnpl-regtech’: ‘BNPL is a credit product embedded in a merchant experience — the bank issues credit at the point of purchase. The RegTech/KYC platform is an identity verification tool embedded in the bank's onboarding experience. One creates credit obligations (Reg Z, ECOA, state usury) and the other creates identity compliance obligations (BSA CIP, OFAC, GLBA). Both involve consumer-facing algorithmic decisions; neither involves the three-ledger FBO reconciliation challenge that distinguishes deposit-based BaaS.’,
};

function getStructuralDiff(id1, id2, s1, s2) {
if (!id1 || !id2 || s1 === s2) return null; // same type, no diff
// Try both orderings
const key = STRUCTURAL_DIFFS[id1+’-’+id2] ? id1+’-’+id2 :
STRUCTURAL_DIFFS[id2+’-’+id1] ? id2+’-’+id1 : null;
if (key) return STRUCTURAL_DIFFS[key];
// Generic diff for any Traditional vs BaaS pair not explicitly listed
if (s1 !== s2) return ‘This comparison places a BaaS charter-extension relationship alongside a Traditional operational outsourcing relationship. The core structural difference: in BaaS, the bank's charter is the product that the fintech distributes to end consumers — the bank holds regulatory liability for a customer population it has never directly served. In traditional outsourcing, the vendor supports the bank's own operations and the bank remains the sole customer-facing entity. The compliance architecture, monitoring obligations, exit procedures, and examiner expectations are structurally different in kind, not just degree.’;
return null;
}

// ── STAGE STRUCTURAL DIFF TEXT PER STAGE ───────────────────────────────────────
const STAGE_DIFFS = {
planning: ‘At the planning stage, the structural difference between Traditional and BaaS manifests in the leverage dynamic. Traditional outsourcing decisions are bank-driven — the bank identifies a need, solicits vendors, and retains negotiating authority. BaaS relationships are often fintech-driven: fintechs seek sponsor banks, and in a supply-constrained market, banks eager for fee income accept terms they would reject in traditional procurement. Planning for a BaaS arrangement must explicitly account for this inverted leverage.’,
duediligence: ‘Traditional due diligence focuses on the vendor's ability to perform a defined function reliably. BaaS due diligence must also assess whether the fintech's compliance culture, customer base, and business model create consumer harm risks that the bank will ultimately own. A fintech with a compliant vendor management program but a consumer-hostile product design is a BaaS risk that no SOC 2 report will surface.’,
contract: ‘Traditional contracts define what the vendor delivers and what the bank pays. BaaS contracts must additionally define how the bank retains control over its charter — through FBO reconciliation rights, consumer protection pass-throughs, and step-in rights. The contract is the primary mechanism by which a bank avoids becoming a “name only” regulatory cover for a fintech's product.’,
monitoring: ‘Traditional monitoring is periodic — monthly or quarterly reviews of SLA performance and financial condition. BaaS monitoring must be continuous for deposit arrangements: daily FBO reconciliation, real-time transaction visibility, and monthly consumer complaint surveillance. The FDIC proposed custodial deposit rule would make daily reconciliation a regulatory requirement, not a best practice.’,
termination: ‘Traditional relationship termination is operationally complex but legally straightforward — the bank transitions to a substitute vendor. BaaS termination must resolve who owns the customers, who holds their money, and who is responsible for the loans. In 79% of BaaS enforcement actions, regulators required an independent lookback review after termination. The exit from a BaaS relationship is not a procurement event — it is a regulatory event.’,
