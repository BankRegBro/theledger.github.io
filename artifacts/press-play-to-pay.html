// Reveal on scroll

function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          setVisible(true);
          obs.disconnect();
        }
      },
      { threshold: 0.15 }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, delay = 0, className = "" }) {
  const [ref, visible] = useReveal();
  return (
    <div
      ref={ref}
      className={className}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0)" : "translateY(24px)",
        transition: `opacity 900ms cubic-bezier(.2,.8,.2,1) ${delay}ms, transform 900ms cubic-bezier(.2,.8,.2,1) ${delay}ms`,
      }}
    >
      {children}
    </div>
  );
}

function CountUp({ value, prefix = "", suffix = "", decimals = 0, duration = 1400 }) {
  const [ref, visible] = useReveal();
  const [n, setN] = useState(0);
  useEffect(() => {
    if (!visible) return;
    const start = performance.now();
    let raf;
    const tick = (t) => {
      const p = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setN(value * eased);
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [visible, value, duration]);
  return (
    <span ref={ref}>
      {prefix}
      {n.toLocaleString(undefined, {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      })}
      {suffix}
    </span>
  );
}

          <Reveal delay={360}>

      {/* Body */}
      <article style={{ maxWidth: 780, margin: "0 auto", padding: "56px 28px 0", position: "relative", zIndex: 2 }}>
        <Reveal>
          <Para dropCap>
            {`The filing arrived at the Office of the Comptroller of the Currency in late 2026, forty-seven pages of dense regulatory prose submitted under the name Sony Financial Trust, N.A. Applications for national trust charters are not ordinarily newsworthy. This one is different. Buried in section four, under the heading "Proposed Activities and Services," is a single sentence that has set the payments industry on edge: the applicant intends, upon approval of its charter and subject to certification by the Stablecoin Certification Commission under the GENIUS Act of 2026, to issue a fully reserved, US dollar-denominated payment stablecoin for use across Sony's global digital ecosystem.`}

        </Reveal>

        <Reveal>
          <Para>
            Sony is, in other words, applying to become a bank. Not a retail bank — it is
            not proposing to take deposits from the public or make loans in any
            conventional sense. A trust bank: a narrowly chartered institution holding
            assets on behalf of others, and in this case, holding the Treasury-bill

          </Para>

        <Reveal>
          <Para>

            his disposition. In a speech to the American Bankers Association in October,
            he described the GENIUS Act as "the most consequential piece of financial
            infrastructure legislation since Dodd-Frank" and argued that the OCC's
            mandate under the Act was to enable regulated innovation, not to protect
            incumbent business models. People familiar with the review process say a
            conditional approval is the most likely outcome, probably in the first
            quarter of 2027. The payments industry is not waiting to find out.
          </Para>
        </Reveal>

        <PullQuote attribution="Senior executive, large card-issuing bank">
          We are modelling the approval as a near-certainty. The question we are
          spending our time on is not whether it happens. It is what we do when it
          does.
        </PullQuote>

        <SectionHead kicker="Part I">The ecosystem Sony has been quietly assembling</SectionHead>

        <Reveal>
          <Para>
            Sony's ambitions in financial services have been visible to attentive
            observers for several years, assembled in pieces that only resolve into a
            coherent picture when set alongside the trust charter application. The
            digital wallet integrations, the gradual consolidation of payment flows
            across PlayStation and Sony's streaming services, the restructuring of the
            PlayStation Credits system to accommodate fiat-currency balances — each
            individual move looked, in isolation, like routine platform housekeeping.
            Together, they look like the groundwork for a monetary system.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            Consider what Sony actually controls. PlayStation Network has{" "}
            <SmallCaps>145 million</SmallCaps> active monthly users who collectively
            spend an estimated <SmallCaps>$26bn</SmallCaps> annually on games,
            downloadable content, subscriptions, and in-game purchases. Sony Pictures
            releases roughly 25 films per year and controls a streaming library that
            reaches over 100 countries. Sony Music is one of the three major labels,
            representing artists whose combined monthly streams run to billions. Sony's
            Alpha camera ecosystem has cultivated a community of professional and
            semi-professional photographers and videographers who buy hardware, software
            subscriptions, and cloud storage in recurring cycles. Sony's Bravia
            televisions are the primary entertainment screen in tens of millions of
            households globally.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <EcosystemPanel />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            Each of these businesses currently handles payments through a fragmented
            mixture of credit cards, regional processors, and platform-specific wallet
            systems that do not communicate with each other. A PlayStation gamer who
            also subscribes to Sony's streaming service, purchases Sony Music content,
            and stores photographs on Sony's cloud pays for each of these separately,
            through different interfaces, generating interchange fees — typically{" "}
            <SmallCaps>2% to 3%</SmallCaps> — on every transaction. A Sony-issued
            stablecoin that unified these payment flows would eliminate that friction
            entirely, keeping the value within the Sony ecosystem from the moment it is
            loaded to the moment it is spent.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <PaymentFlow />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            The interchange saving, at a conservative 2% on Sony's own-platform
            transaction volume, is estimated at roughly <SmallCaps>$520m</SmallCaps>{" "}
            annually at full adoption. Significant, but it is not the primary
            commercial logic of the application. The more compelling calculation is the
            float. Under the GENIUS Act's reserve requirements, stablecoin issuers must
            hold one-to-one backing in short-duration Treasury bills. At current T-bill
            yields of approximately <SmallCaps>4.3%</SmallCaps>, a circulating SEN Coin
            supply of $5bn at steady-state adoption would generate roughly{" "}
            <SmallCaps>$215m</SmallCaps> in annual reserve income — income that the Act
            permits Sony to retain. At $10bn in circulation, that figure doubles. The
            consumer holding a balance in a Sony wallet is, in effect, lending Sony
            money that Sony invests in government securities and pockets the return.
            The consumer gets access to a seamless entertainment payment system. Sony
            gets a funding mechanism.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <FloatCalculator />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <SectionHead kicker="Part II">The trust charter question</SectionHead>

        <Reveal>
          <Para>
            The decision to seek a national trust charter rather than a state
            money-transmitter licence or a banking partnership reflects a calculation
            about control and permanence. A money-transmitter licence is a
            state-by-state patchwork that limits the types of reserve assets that can
            be held and imposes operational constraints incompatible with a global
            payment system. A banking partnership gives the chartered partner
            meaningful oversight and extracts a commercial margin. A national trust
            charter, issued by the OCC and valid in all fifty states, gives Sony a
            federally regulated institution of its own — the authority to hold and
            manage Treasury assets without intermediation, to operate within the
            federal payments system, and to issue a stablecoin that carries the
            regulatory legitimacy of a nationally chartered bank.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The legal pathway is well-trodden in principle, if not in practice for an
            applicant of Sony's profile. The OCC has issued trust charters to a range
            of non-traditional applicants in recent years, and the GENIUS Act's
            framework was explicitly designed to accommodate non-bank stablecoin
            issuers who could demonstrate adequate reserve management and consumer
            protection infrastructure. Comptroller Gould has publicly argued that
            restricting trust charters to traditional financial institutions would be
            inconsistent with the Act's intent.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            <SmallCaps>The banking lobby</SmallCaps> disagrees, volubly. The
            Independent Community Bankers of America has filed a detailed comment
            letter arguing that granting trust charters to technology conglomerates
            creates an uneven playing field — large corporations obtaining the benefits
            of bank charters without the full obligations of full-service banking,
            including Community Reinvestment Act requirements and comprehensive
            consumer lending responsibilities. The letter has the ring of an argument
            made by people who know they are losing but feel compelled to make the
            record. The OCC has shown limited appetite for arguments that amount to
            incumbent protection, and Gould has been explicit that the GENIUS Act
            requires him to evaluate applicants on their merits, not on the convenience
            of existing institutions.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The more substantive concern, which the OCC's own staff have reportedly
            raised in the review process, is the concentration of financial and
            behavioural data. A Sony trust entity intermediating payments across
            gaming, streaming, music, photography, and consumer electronics would
            accumulate a dataset of extraordinary granularity — not merely what
            consumers buy, but the full texture of how they spend their leisure time
            and their disposable income. The consumer protection implications of that
            data sitting inside a financial institution, subject to bank privacy rules
            that were written long before the concept of an entertainment-conglomerate
            bank existed, are not trivial. The conditional approval that observers
            expect will almost certainly include enhanced data-governance requirements
            and strict separation between payment data and commercial data.
          </Para>
        </Reveal>

        <SectionHead kicker="Part III">What SEN Coin would actually look like</SectionHead>

        <Reveal>
          <Para>
            Sony has disclosed relatively little about the operational design of what
            it refers to internally, according to three people familiar with the
            matter, as SEN Coin — for Sony Entertainment Network. The OCC filing is
            more revealing. The stablecoin would be issued by Sony Financial Trust,
            N.A., backed one-to-one by short-duration US Treasury bills held in a
            segregated trust account, and redeemable at par on demand. It would be
            denominated in US dollars and carry the regulatory imprimatur of a GENIUS
            Act-certified payment stablecoin.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            Consumers would load SEN Coin from a linked bank account or debit card
            directly into a Sony wallet integrated across PlayStation, Sony's streaming
            apps, and the company's broader digital services. The wallet would replace,
            rather than sit alongside, the existing PlayStation Credits system — a
            migration that Sony has reportedly been preparing its user base for with a
            gradual deprecation of Credits-only features over the past eighteen months.
            Spending SEN Coin within the Sony ecosystem would carry no transaction fee.
            Conversion back to dollars would be available at any time at par, subject
            to standard AML verification.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The rewards architecture, which Sony has not yet publicly detailed but
            which industry analysts have been modelling from the OCC filing's
            financial projections, is expected to take the form of SEN Credits
            distributed to wallet holders as a fraction of the yield earned on their
            balances — redeemable for game content, streaming subscriptions, hardware
            discounts, and eventually, if the merchant acceptance programme proceeds,
            purchases at third-party retailers. The effect is a loyalty programme
            funded not by merchant interchange but by the return on the consumer's own
            money. A consumer maintaining a $150 average SEN Coin balance at a 4.3%
            T-bill yield earns approximately $6.45 in SEN Credits annually — modest
            individually, but the structure is more sustainable than the
            interchange-funded points programmes it would compete with, because Sony
            does not pay for the rewards out of margin. It redistributes a fraction of
            the float.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <PersonalYield />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <PullQuote attribution="Thomas Osei, fintech investor">
          It's the most elegant monetisation of trust I've seen proposed in financial
          services in years. They're taking the consumer's own money, investing it in
          Treasuries, and giving back a slice of the return as entertainment rewards.
          The consumer feels rewarded. Sony keeps the rest of the yield.
        </PullQuote>

        <SectionHead kicker="Part IV">The generational dimension</SectionHead>

        <Reveal>
          <Para>
            The feature of Sony's application that most unsettles the established
            payments industry is not the arithmetic but the demography. The population
            that Sony is targeting with SEN Coin — the 145 million monthly PlayStation
            Network users, skewed heavily toward the 18-to-35 cohort — is at precisely
            the stage of life when primary financial habits are formed. Visa and
            Mastercard built their cardholder bases by being present at the moment a
            young adult applied for their first credit card. Sony is proposing to be
            present at an earlier moment: the point at which a young adult's
            entertainment spending, which for this demographic is substantial and
            frequent, migrates to a payment system native to the platform they already
            inhabit.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <GenerationalStrip />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            A 22-year-old who adopts SEN Coin for PlayStation spending is not merely
            adopting a payment method. They are establishing a wallet relationship with
            a regulated financial institution, learning to maintain a balance in a
            Sony-controlled account, and beginning to accumulate the transaction
            history and reward balance that will make switching to an alternative
            payment system progressively more costly. The network effects in payment
            systems are well-documented and durable. First-mover advantages, once
            established, are difficult to displace. Sony is not proposing to compete
            with Visa in the general-purpose payments market — not yet, at any rate.
            It is proposing to capture the formation moment, before the
            general-purpose card relationship is established, in the specific context
            of entertainment spending.
          </Para>
        </Reveal>

        <PullQuote attribution="Senior executive, major card network">
          The card became the default because it was the first one. Sony is trying to
          be present at an even earlier moment — before the first card application, in
          the spending context that young people actually care about. If they get the
          wallet relationship at twenty-two, the card relationship at twenty-five is a
          different conversation. That's what keeps us up at night.
        </PullQuote>

        <Reveal>
          <Para>
            <SmallCaps>The cross-media dimension</SmallCaps> amplifies the strategic
            logic in ways that have no precedent in the payments industry. Sony does
            not merely want to process payments for its existing services. It wants
            the payment system and the content library to reinforce each other. A
            consumer who loads SEN Coin to buy a PlayStation game may find that the
            same wallet offers a discounted first month of Sony's streaming service. A
            Sony Music subscriber who pays with SEN Coin earns SEN Credits redeemable
            for PlayStation content. A Bravia television owner who activates the Sony
            wallet integration gets early access to new Sony Pictures releases. None
            of these linkages requires consumers to think of themselves as using a
            financial product. The payment is invisible. The rewards accumulate. The
            loop tightens.
          </Para>
        </Reveal>

        <SectionHead kicker="Part V">The content flywheel</SectionHead>

        <Reveal>
          <Para>
            The most ambitious element of Sony's vision — and the one that is
            generating the most regulatory scrutiny alongside the OCC review — is what
            its internal strategists have been calling the content flywheel: a
            self-reinforcing cycle in which the payment system and the content
            business drive each other's growth.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The mechanism is straightforward in concept. SEN Coin adoption is
            accelerated by content incentives — exclusive release windows, day-one DLC
            access, discounted subscriptions, early film rentals — available only to
            wallet holders. The broader the SEN Coin adoption, the larger the float
            and the greater the reserve income. The reserve income funds more content
            investment and more generous rewards. Better content and rewards drive
            further SEN Coin adoption. The financial infrastructure and the creative
            infrastructure become, in this model, a single integrated engine rather
            than parallel businesses that happen to share a parent company.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <Flywheel />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            Sony has been careful not to describe this model in public in terms that
            would attract immediate antitrust attention. The OCC filing describes the
            content incentives as "optional commercial promotions available at Sony's
            discretion" rather than structural features of the payment product.
            Competition lawyers who have reviewed the filing publicly note that the
            distinction between a promotional tie and an anticompetitive tie depends
            heavily on implementation — that offering SEN Coin holders a discount on a
            Sony streaming subscription is quite different, legally, from making a
            Sony streaming subscription unavailable to those who do not use SEN Coin.
            Sony has explicitly disclaimed any intention to engage in the latter.
            Whether the commercial pressure to maximise SEN Coin adoption will, in
            practice, preserve that distinction over time is a question that the
            Department of Justice's antitrust division has reportedly begun to ask.
          </Para>
        </Reveal>

        <PullQuote attribution="The Ledger">
          Sony has disclaimed any intention to make content unavailable to non-SEN
          Coin users. Whether the commercial pressure to maximise adoption will
          preserve that distinction over time is a question the DOJ has reportedly
          begun to ask.
        </PullQuote>

        <Reveal>
          <Para>
            <SmallCaps>The data flywheel</SmallCaps> runs alongside the content
            flywheel and is, in some respects, more powerful. A Sony Financial Trust
            entity intermediating payments across gaming, streaming, music, film, and
            photography generates a dataset that is without parallel in the
            entertainment industry: not merely what consumers enjoy, which platform
            analytics already reveal, but how much they are willing to pay for it, how
            quickly they spend after loading their wallet, how their entertainment
            consumption correlates with their financial behaviour, and which content
            investments generate the highest consumer financial engagement. This is a
            dataset that transforms Sony from a content company that knows what its
            customers watch into a financial institution that understands how its
            customers value their own leisure and their own money. The CFPB has
            already indicated it will scrutinise Sony's data-governance commitments
            closely if and when a charter is granted.
          </Para>
        </Reveal>

        <SectionHead kicker="Part VI">The road to approval</SectionHead>

        <Reveal>
          <Para>
            The OCC is expected to issue its ruling on Sony's trust charter
            application in the first quarter of 2027. The Stablecoin Certification
            Commission, which must separately certify any GENIUS Act-compliant
            stablecoin, typically follows an OCC trust charter approval within ninety
            days for applicants whose reserve architecture has already been reviewed
            as part of the charter process. If both approvals proceed on the expected
            timeline, SEN Coin could be in the hands of consumers before the end of
            2027.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <Timeline />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            The form of the approval matters as much as the fact of it. A narrow
            charter, restricting SEN Coin to closed-loop use within Sony's own digital
            services, would validate the immediate commercial logic while deferring the
            broader question of whether Sony can build a general-purpose payment
            network. A broad charter — authorising SEN Coin for use at third-party
            merchants who choose to accept it — would immediately position Sony as a
            payment network competitor rather than a platform loyalty programme, with
            all the competitive and regulatory consequences that implies.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            Comptroller Gould has not signalled his preference publicly. People
            familiar with his thinking say he is inclined toward a broad charter on
            the grounds that an artificially restricted approval would be inconsistent
            with the GENIUS Act's intent to enable competition in the payments market.
            If that is the outcome, the implications for Visa, Mastercard, and the
            banks that issue credit cards would be immediate and significant. The card
            networks have spent the past year building their responses. None of them
            believes those responses are ready for a broad-charter scenario.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The Independent Community Bankers and the major card networks have one
            remaining avenue of resistance: Congress. Several members of the Senate
            Banking Committee have signalled interest in amending the GENIUS Act to
            impose additional restrictions on large-platform stablecoin issuers,
            including minimum holding periods before float income can be retained,
            mandatory CRA-equivalent obligations, and caps on the total circulating
            supply of any single non-bank stablecoin. Whether these amendments could
            pass, and whether they could be enacted before Gould issues his ruling,
            is uncertain. The legislative calendar is crowded and the fintech lobby is
            well-resourced.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            What is not uncertain is that the GENIUS Act has created a legal framework
            under which a consumer electronics and entertainment company can plausibly
            obtain the powers of a federally chartered financial institution and issue
            its own digital dollar. That framework exists. Sony's application is
            testing it for the first time at commercial scale, and the answer
            Comptroller Gould provides will determine not just Sony's future but the
            future of every large consumer-platform company that is watching the
            review process and preparing its own filing.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <QueueViz />
      </div>

          </Para>
        </Reveal>
