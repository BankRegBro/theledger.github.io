/* ─────────────────────── STATE ─────────────────────── */
let activeId = "overview";
let expandedBooklet = null;
let expandedStage = 1;
let expandedPrinciple = null;
let expandedTool = 0;

/* ─────────────────────── HELPERS ─────────────────────── */
function idx() { return CHAPTERS.findIndex(c => c.id === activeId); }
function chapter() { return CHAPTERS[idx()]; }
function accent() { return chapter().color; }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function setExpandable(el, open) {
  if (open) {
    el.style.maxHeight = el.scrollHeight + 'px';
    el.classList.add('open');
  } else {
    el.style.maxHeight = '0';
    el.classList.remove('open');
  }
}

/* ─────────────────────── RENDER TOPBAR ─────────────────────── */
function renderTopbar() {
  const dotsEl = document.getElementById('progress-dots');
  dotsEl.innerHTML = '';
  CHAPTERS.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'dot';
    btn.title = ch.label;
    btn.style.width = (ch.id === activeId ? '26px' : '7px');
    btn.style.background = ch.id === activeId ? ch.color : (i < idx() ? ch.color + '55' : '#1E2A45');
    btn.addEventListener('click', () => navigate(ch.id));
    dotsEl.appendChild(btn);
  });
  document.getElementById('progress-count').textContent = `${idx()+1} / ${CHAPTERS.length}`;
}

/* ─────────────────────── RENDER SIDEBAR ─────────────────────── */
function renderSidebar() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = '';
  CHAPTERS.forEach(ch => {
    const isActive = ch.id === activeId;
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (isActive ? ' active' : '');
    btn.style.background = isActive ? `${ch.color}12` : 'transparent';
    btn.style.borderLeftColor = isActive ? ch.color : 'transparent';
    btn.innerHTML = `
      <span class="nav-icon" style="color:${isActive ? ch.color : '#2A3A55'}">${ch.icon}</span>
      <span class="nav-label">${ch.label}</span>
      <span class="nav-dot" style="background:${ch.color}"></span>
    `;
    btn.addEventListener('click', () => navigate(ch.id));
    nav.appendChild(btn);
  });
}

/* ─────────────────────── RENDER CHAPTER HEADER ─────────────────────── */
function renderHeader() {
  const ch = chapter(), a = accent();
  const header = document.getElementById('chapter-header');
  header.style.background = `linear-gradient(135deg, ${a}20 0%, ${a}07 55%, transparent 100%)`;
  header.style.borderBottomColor = `${a}20`;
  header.querySelector('.top-stripe').style.background = `linear-gradient(90deg, ${a} 0%, ${a}50 50%, transparent 100%)`;
  header.querySelector('.ghost-icon').textContent = ch.icon;
  header.querySelector('.ghost-icon').style.color = `${a}09`;
  header.querySelector('.ch-eyebrow').textContent = `${ch.icon} ${ch.label}`;
  header.querySelector('.ch-eyebrow').style.color = a;
  header.querySelector('.ch-title').textContent = ch.title;
  header.querySelector('.ch-subtitle').textContent = ch.subtitle;
}

/* ─────────────────────── RENDER CHAPTER BODY ─────────────────────── */
function renderBody() {
  const body = document.getElementById('chapter-body');
  body.innerHTML = '';
  body.className = 'fade-in';
  void body.offsetWidth; // reflow to re-trigger animation

  const ch = chapter(), a = accent(), c = ch.content;

  if (c.type === 'intro') renderIntro(body, c, a);
  else if (c.type === 'booklets') renderBooklets(body, c, a);
  else if (c.type === 'lifecycle') renderLifecycle(body, c, a);
  else if (c.type === 'mrm') renderMRM(body, c, a);
  else if (c.type === 'systemic') renderSystemic(body, c, a);
  else if (c.type === 'quant') renderQuant(body, c, a);

  renderBottomNav(body, a);
}

function renderLifecycle(parent, c, a) {
  parent.appendChild(introText(c.intro));
  c.stages.forEach(stage => {
    const isOpen = expandedStage === stage.num;
    const item = el('div', 'timeline-item');

    // Spine
    const spine = el('div', 'timeline-spine');
    const circle = el('button', 'stage-circle' + (isOpen ? ' active' : ''));
    circle.textContent = stage.num;
    circle.style.background = isOpen ? a : '#0D1830';
    circle.style.borderColor = isOpen ? a : '#1E2A45';
    if (isOpen) circle.style.color = '#080E1F';
    circle.addEventListener('click', () => { expandedStage = isOpen ? null : stage.num; renderAll(); });
    spine.appendChild(circle);
    if (stage.num < 5) spine.appendChild(el('div', 'timeline-line'));
    item.appendChild(spine);

    // Content

    titleRow.innerHTML = `<span>Stage ${stage.num}: ${stage.name}</span><span class="chevron${isOpen ? ' open' : ''}">›</span>`;
    stageCard.appendChild(titleRow);

    // Expandable inner
    const expInner = el('div');
    expInner.style.marginTop = '16px';

    const twoCol = el('div', 'two-col');
    twoCol.appendChild(cloudAICard('Cloud Focus', '#5B8DB8', stage.cloud));
    twoCol.appendChild(cloudAICard('AI Focus', a, stage.ai));
    expInner.appendChild(twoCol);

    if (stage.showDueDiligence) {
      const ddWrap = el('div', 'dd-table-wrap');
      const ddLabel = el('div', 'micro-label'); ddLabel.textContent = 'Due Diligence Factor Comparison';
      ddWrap.appendChild(ddLabel);
      const ddTable = el('div', 'dd-table');
      const thead = el('div', 'thead');
      ['Factor','Cloud Focus','AI Focus'].forEach((h,hi) => {
        const th = el('div','th' + (hi < 2 ? ' border-right' : '')); th.textContent = h; thead.appendChild(th);
      });
      ddTable.appendChild(thead);
      c.dueDiligenceTable.forEach((row, ri) => {
        const tr = el('div', 'tbody-row ' + (ri % 2 === 0 ? 'row-even' : 'row-odd'));
        const d1 = el('div','td accent-col border-right'); d1.style.color = a; d1.textContent = row.factor;
        const d2 = el('div','td border-right'); d2.textContent = row.cloud;
        const d3 = el('div','td'); d3.textContent = row.ai;
        tr.appendChild(d1); tr.appendChild(d2); tr.appendChild(d3);
        ddTable.appendChild(tr);
      });
      ddWrap.appendChild(ddTable);
      expInner.appendChild(ddWrap);
    }

    callout.style.background = `${a}0C`;
    callout.style.borderLeftColor = a;
    callout.innerHTML = `<span class="label" style="color:${a}">Examiner Focus:</span><span class="text">${stage.examinerFocus}</span>`;
    expInner.appendChild(callout);

    nav.appendChild(prev);
  } else {
    nav.appendChild(el('div', 'nav-placeholder'));
  }

  const dots = el('div', 'bottom-dots');
  CHAPTERS.forEach((ch, di) => {
    const d = el('div', 'bottom-dot');
    d.style.background = di === i ? a : (di < i ? a + '55' : '#1A2A45');

  });
  nav.appendChild(dots);

  if (i < CHAPTERS.length - 1) {
    const next = el('button', 'nav-next');
    next.textContent = 'Next →';
    next.style.background = a;
    next.addEventListener('click', () => navigate(CHAPTERS[i+1].id));
    nav.appendChild(next);
  } else {
    nav.appendChild(el('div', 'nav-placeholder'));
  }

  parent.appendChild(nav);
}

/* ─────────────────────── SMALL HELPERS ─────────────────────── */
function el(tag, className = '') {
  const e = document.createElement(tag);
  if (className) e.className = className;
  return e;
}
function introText(text) {
  const p = el('p', 'intro-text'); p.textContent = text; return p;
}
function sectionLabel(text) {
  const d = el('div', 'section-label'); d.textContent = text; return d;
}
function cloudAICard(label, color, text) {
  const card = el('div', 'cloud-ai-card');
  card.innerHTML = `<p class="micro-label" style="color:${color}">${label}</p><p>${text}</p>`;
  return card;
}

/* ─────────────────────── NAVIGATE ─────────────────────── */
function navigate(id) {
  activeId = id;
  expandedBooklet = null;
  expandedStage = 1;
  expandedPrinciple = null;
  expandedTool = 0;
  renderAll();
  document.getElementById('main').scrollTop = 0;
}

/* ─────────────────────── RENDER ALL ─────────────────────── */
function renderAll() {
  renderTopbar();
  renderSidebar();
  renderHeader();
  renderBody();
}

renderAll();
</script>
