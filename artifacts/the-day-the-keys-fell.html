function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          setVisible(true);
          obs.disconnect();
        }
      },
      { threshold: 0.12 }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, delay = 0, className = "" }) {
  const [ref, visible] = useReveal();
  return (
    <div
      ref={ref}
      className={className}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? "translateY(0)" : "translateY(20px)",
        transition: `opacity 900ms cubic-bezier(.2,.8,.2,1) ${delay}ms, transform 900ms cubic-bezier(.2,.8,.2,1) ${delay}ms`,
      }}
    >
      {children}
    </div>
  );
}

function CountUp({ value, prefix = "", suffix = "", decimals = 0, duration = 1600 }) {
  const [ref, visible] = useReveal();
  const [n, setN] = useState(0);
  useEffect(() => {
    if (!visible) return;
    const start = performance.now();
    let raf;
    const tick = (t) => {
      const p = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setN(value * eased);
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [visible, value, duration]);
  return (
    <span ref={ref}>
      {prefix}
      {n.toLocaleString(undefined, {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      })}
      {suffix}
    </span>
  );
}

// FIGURE 5 — PQC migration cost calculator
// ————————————————————————————————————————————————————————————————
function MigrationCalculator() {
  const [assets, setAssets] = useState(500); // $m
  const [aiAssist, setAiAssist] = useState(60); // % of workflow AI-assisted
  const [hsmFleet, setHsmFleet] = useState(12); // # of HSMs

  // Cost model (rough, based on reported industry figures):
  // base inventory + crypto discovery: scales with log of assets
  // HSM refresh: fixed per unit
  // application refactoring: biggest component, scales with assets
  // AI assistance compresses refactor and inventory by up to ~60%
  const inventory = Math.round(120 + 40 * Math.log10(assets + 10));
  const hsm = hsmFleet * 85; // $85k per HSM unit refresh
  const refactorBase = Math.round(Math.pow(assets, 0.55) * 120);
  const aiMultiplier = 1 - (aiAssist / 100) * 0.6;
  const refactor = Math.round(refactorBase * aiMultiplier);
  const testing = Math.round(refactor * 0.35);
  const training = Math.round(140 + assets * 0.08);
  const total = inventory + hsm + refactor + testing + training;

  // Without AI assistance, baseline
  const refactorNoAI = refactorBase;
  const testingNoAI = Math.round(refactorNoAI * 0.35);
  const totalNoAI = inventory + hsm + refactorNoAI + testingNoAI + training;
  const savings = totalNoAI - total;

  return (
    <FigureFrame
      eyebrow="Figure 5 · Interactive"
      title="What migration actually costs"
      subtitle="An approximate cost model for post-quantum cryptographic migration. Dial your institution's profile to see the bill — and how much AI-assisted migration changes it."
      source="The Ledger, from vendor-reported migration pricing, NIST PQC project estimates, and institutional disclosures"
    >
      <div
        style={{
          display: "grid",
          gridTemplateColumns: "1fr 1fr",
          gap: 28,
          alignItems: "start",
        }}
      >
        <div>
          <Slider
            label="Institution assets"
            value={`$${assets}m`}
            min={50}
            max={5000}
            step={50}
            current={assets}
            onChange={setAssets}
            rangeLabel={["$50m", "$5bn"]}
          />
          <Slider
            label="AI-assisted workflow share"
            value={`${aiAssist}%`}
            min={0}
            max={90}
            step={5}
            current={aiAssist}
            onChange={setAiAssist}
            rangeLabel={["0%", "90%"]}
          />
          <Slider
            label="HSM fleet size"
            value={`${hsmFleet} units`}
            min={1}
            max={60}
            step={1}
            current={hsmFleet}
            onChange={setHsmFleet}
            rangeLabel={["1", "60"]}
          />
        </div>

        <div
          style={{
            padding: "24px 24px 22px",
            background: NAVY,
            color: CREAM,
            border: `2px solid ${GOLD}`,
          }}
        >
          <div
            style={{
              fontFamily: '"Inconsolata", monospace',
              fontSize: 10,
              letterSpacing: "0.25em",
              textTransform: "uppercase",
              color: GOLD,
              marginBottom: 10,
            }}
          >
            Estimated migration cost
          </div>
          <div
            style={{
              fontFamily: '"Playfair Display", Georgia, serif',
              fontSize: 44,
              fontWeight: 900,
              color: CREAM,
              letterSpacing: "-0.03em",
              lineHeight: 1,
              marginBottom: 4,
            }}
          >
            ${total.toLocaleString()}k
          </div>
          <div
            style={{
              fontFamily: "Georgia, serif",
              fontSize: 13,
              color: "rgba(245,239,225,0.65)",
              fontStyle: "italic",
              marginBottom: 18,
            }}
          >
            across crypto inventory, refactoring, HSM refresh, testing, and training
          </div>
          <div style={{ display: "grid", gap: 8 }}>
            <CostLine label="Crypto inventory & discovery" value={inventory} />
            <CostLine label="HSM refresh" value={hsm} />
            <CostLine label="Application refactoring" value={refactor} accent />
            <CostLine label="Testing & validation" value={testing} />
            <CostLine label="Training & governance" value={training} />
          </div>
          <div
            style={{
              marginTop: 18,
              paddingTop: 14,
              borderTop: `1px dashed rgba(245,239,225,0.25)`,
              fontFamily: "Georgia, serif",
              fontSize: 13,
              fontStyle: "italic",
              color: "rgba(245,239,225,0.85)",
              lineHeight: 1.5,
            }}
          >
            Without AI assistance: <strong style={{ color: CRIMSON, fontStyle: "normal" }}>${totalNoAI.toLocaleString()}k</strong>.
            Your savings: <strong style={{ color: GOLD, fontStyle: "normal" }}>${savings.toLocaleString()}k</strong> ({Math.round((savings / totalNoAI) * 100)}%).
          </div>
        </div>
      </div>
    </FigureFrame>
  );
}

            {`On the morning of 5 February 2029, a team of physicists and computer scientists at an IBM Quantum facility in Armonk, New York, working jointly with researchers from a national laboratory whose participation has not been declassified, factored a 2,048-bit RSA integer on a fault-tolerant quantum computer. The calculation took approximately nine hours. The machine had 4,099 logical qubits, an error-correction overhead that would have seemed implausible five years earlier, and an unremarkable name. The paper was peer-reviewed within seventy-two hours. By the end of the week, the result was no longer contested. The cryptographic assumptions underpinning roughly three-quarters of the software running inside the American financial system were, as a matter of mathematics, no longer assumptions.`}
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            What followed was not the kind of crisis that the industry had spent
            the preceding decade rehearsing. There was no power outage, no
            ransomware lockscreen, no theatrical attribution to a foreign
            intelligence service. The mechanism was quieter and, in a way,
            crueler: keys that the industry had been protecting for thirty years
            under the assumption that they would never be derived had, in the
            twelve months preceding the breakthrough, been derived. Wires that
            settled on 13 February 2029 at a mid-sized community bank in
            Missouri looked, to every layer of the institution's authorisation
            infrastructure, indistinguishable from wires the bank's treasury
            function had genuinely initiated. Forty-seven million dollars left
            the institution in nine hours. The bank was in FDIC bridge status by
            the end of the following week.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            This is a story that intersects three trajectories that had, until
            very recently, been understood as running more or less in parallel:
            the quiet maturation of generative AI inside financial services, the
            long, slow federal push toward post-quantum cryptography, and a
            quantum hardware curve that most serious observers believed would
            not produce a cryptographically relevant machine until the middle of
            the 2030s. The three converged in a seventy-two-hour window in
            February 2029, and the convergence produced a rank-ordering of
            American banks that has reshaped the industry more fundamentally
            than any supervisory reform of the preceding decade.
          </Para>
        </Reveal>

        <PullQuote attribution="Senior examiner, Federal Reserve Bank of St Louis">
          Every institution was told in 2024 what to do. Some believed the
          deadline was 2035. Some believed it was 2029. The ones who believed
          2029 survived.
        </PullQuote>

        <SectionHead kicker="Part I">The window that closed early</SectionHead>

        <Reveal>
          <Para>
            To understand what happened on the fifth of February, it helps to
            recall what the banking industry had been told to expect. The
            framework, due originally to the cryptographer Michele Mosca, is
            elegant: an institution is at risk if the sum of the time needed to
            migrate its cryptographic infrastructure (x), plus the duration
            over which captured data must remain confidential (y), is greater
            than the time until a cryptographically relevant quantum computer
            exists (z). For most of the preceding decade, consensus estimates
            placed z between ten and fifteen years. Mosca himself, in a widely
            circulated 2022 estimate, described a "one-in-seven" chance of a
            CRQC by 2026 and a "one-in-two" chance by 2031. Regulators planned
            accordingly.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The National Security Memorandum of 2022, which directed federal
            agencies to migrate to post-quantum cryptography by 2035, treated
            that horizon as the binding one. The <SmallCaps>CNSA 2.0</SmallCaps>{" "}
            guidance from the National Security Agency, issued in 2022 and
            updated in 2024, prescribed migration milestones that were
            aggressive by federal standards but assumed more than a decade of
            runway. NIST finalised the first three post-quantum standards —
            ML-KEM, ML-DSA, and SLH-DSA, now better known by their FIPS numbers{" "}
            <SmallCaps>203, 204 and 205</SmallCaps> — in August 2024. The
            Federal Financial Institutions Examination Council issued guidance
            in late 2024 that was, in retrospect, unambiguous: federally
            supervised institutions were expected to develop cryptographic
            inventories immediately and to begin migration planning for
            long-horizon data by 2026. The guidance was not, however,
            prescriptive about the pace of application-layer refactoring, and
            the FFIEC did not specify a deadline for complete migration.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <MoscaWindow />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            The industry largely interpreted that silence generously. A 2028
            FFIEC survey found that among institutions with under $10bn in
            assets — which together hold approximately 18% of the commercial
            deposit base — fewer than 15% had completed a meaningful
            cryptographic inventory. Among banks with under $1bn in assets,
            that figure was 6%. Community bank trade groups, not unreasonably,
            had argued throughout the preceding three years that migration was
            expensive, that the deadlines were not firm, and that the hardware
            horizon remained comfortably distant. The argument was internally
            consistent. It was also wrong about the horizon.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            What the industry did not know, and what the physics community had
            been quietly debating since late 2027, was that three independent
            research programmes had produced unexpectedly rapid improvements in
            error-correction overhead. A combination of new topological-code
            variants, improvements in superconducting qubit coherence times,
            and a series of algorithmic refinements to Shor's algorithm had
            collapsed the physical-to-logical qubit ratio by nearly an order of
            magnitude between 2026 and 2028. The 4,099-logical-qubit machine
            demonstrated in February 2029 was built on roughly 1.2 million
            physical qubits — a number that, in 2023, had been projected to be
            a decade away.
          </Para>
        </Reveal>

        <SectionHead kicker="Part II">The Claude mythos, in operational data</SectionHead>

        <Reveal>
          <Para>
            The second trajectory that mattered was the one the banking press
            had, by early 2029, largely stopped describing in breathless terms.
            The generative AI systems that had arrived as curiosities in the
            early 2020s — ChatGPT, Claude, Gemini, and their successors — had
            by 2027 become something closer to infrastructure. The pattern was
            familiar from previous technology cycles: an initial wave of
            demonstrations and proofs-of-concept, a period of organisational
            resistance, a second wave driven by competitive pressure and
            operational cost savings, and eventually a quiet integration into
            the workflows that the institution actually used to conduct
            business.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The industry had by then developed a shorthand for the transition.
            The phrase "Claude-class" — a loose term derived from one of the
            prominent model families and applied broadly across competing
            products — referred to any model capable of sustained reasoning
            across long documents, reliable tool use, and the kind of
            domain-specific adaptation that banking compliance work required.
            By the end of 2028, a little over half of FDIC-insured institutions
            were running Claude-class systems in production — meaning, by the
            FFIEC's definition, that the AI was processing real customer data
            for an auditable business purpose rather than sitting in a
            sandboxed pilot environment.
          </Para>
        </Reveal>

        <PullQuote attribution="Chief information security officer, super-regional bank">
          We stopped talking about the mythos in 2027. By 2028, the model was
          reading our change-management tickets, producing draft policy
          updates for our legal review, and flagging drift in our own
          cryptographic configurations. It was not an assistant. It was a
          junior engineer with very specific limitations and very specific
          strengths.
        </PullQuote>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <AICopilotAdoption />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            The critical development, for the story that follows, was the use
            of Claude-class models for cryptographic inventory and migration
            planning. Cryptographic inventory is the unglamorous, painstaking
            work of identifying every place in an institution's software
            estate where cryptographic operations occur — every certificate,
            every signing operation, every TLS handshake, every hard-coded key
            reference in a legacy mainframe module that has not been modified
            since 1998. For a large regional bank, the inventory might contain
            hundreds of thousands of distinct cryptographic dependencies. For
            a community bank with a smaller software estate but less
            documentation and fewer engineers, the work was often
            proportionally more burdensome.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The value of generative AI for this work turned out to be
            substantial and, crucially, disproportionately helpful to smaller
            institutions. The technology could read undocumented COBOL modules
            and produce annotated dependency maps in hours rather than the
            weeks required by a specialist consulting team. It could trace
            certificate usage across ten thousand lines of PL/I and identify
            precisely which downstream applications would need to be
            recompiled. It could, in the terminology that had emerged by 2027,
            "migrate a codebase" — producing pull requests against an
            institution's source control that replaced RSA operations with
            hybrid ML-DSA equivalents, with the specific caveats and testing
            requirements for the institution's environment.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            This did not make migration cheap. It did not make it easy. It did
            make it tractable for institutions that would otherwise have been
            priced out entirely. A cryptographic migration project that in
            2023 would have required a $4m consulting engagement and eighteen
            months of elapsed time could, by 2028, be conducted by a
            two-person in-house team working with a Claude-class model for
            roughly $600k and six months.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <MigrationCalculator />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            The institutions that took advantage of this capability in 2027 and
            2028 were, unsurprisingly, not evenly distributed. The eight US
            global systemically important banks — JPMorgan, Citi, Bank of
            America, Goldman Sachs, Morgan Stanley, Wells Fargo, Bank of New
            York Mellon, and State Street — had begun PQC migration programmes
            as early as 2023, driven by a combination of regulator pressure,
            national security concerns, and the frank recognition that their
            data-protection horizons were long enough that the Mosca
            arithmetic was already uncomfortable. By the end of 2028,
            aggregate migration across those institutions was approaching
            ninety per cent. The mid-cap regional banks, with tighter budgets
            and less sophisticated cryptographic governance, were further
            behind — but most had at least begun. The institutions furthest
            behind were, almost uniformly, the banks with the smallest
            compliance and technology budgets: community banks, credit unions,
            and a long tail of small regional institutions that served
            specific geographic or industry niches.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            It is not that these institutions had failed to take cybersecurity
            seriously. Most had, in fact, taken it extremely seriously, with
            the tools and frameworks they had. The problem was that the
            specific threat model they were defending against — ransomware,
            credential compromise, supply-chain attacks — had nothing to do
            with the specific vulnerability that was about to manifest.
            Classical cryptographic assumptions had been a floor beneath the
            security architecture of the entire American financial system for
            four decades. When that floor moved, it moved for everyone
            simultaneously.
          </Para>
        </Reveal>

        <SectionHead kicker="Part III">The map of exposure</SectionHead>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <ExposureMap />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            The numbers, once the dust settled on the first month of forensic
            disclosures, told a story that almost anyone who had been paying
            attention to FFIEC survey data could have sketched in advance. Of
            the eight global systemically important banks, none suffered a
            publicly disclosed compromise attributable to the breakthrough.
            Their migration was not complete, but the residual exposure was
            concentrated in older batch-processing systems that did not face
            the internet and whose keys could not be practically derived from
            exfiltrated traffic. Of the twenty-two large regional banks — the
            $100bn-to-$1trn tier — one suffered a compromise. Of the 134
            mid-cap regionals, eleven did. Of the 718 small regionals, forty-seven did. And of the 3,842 community
            banks, 163 suffered compromise in the thirty days following
            the breakthrough.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The inverse correlation was almost mechanical. The institutions
            with the most sophisticated technology functions, the largest
            budgets, and the longest-running migration programmes were the
            ones that experienced the fewest consequences. The institutions
            whose compliance officers had, in many cases correctly, argued
            that their institutions were small, that their data horizons were
            short, and that the threat was overstated — those were the
            institutions whose certificates were being factored and whose
            wires were being forged.
          </Para>
        </Reveal>

        <SectionHead kicker="Part IV">What happened in Missouri</SectionHead>

        <Reveal>
          <Para>
            The case of Merchants First Bank — the pseudonym the FDIC has
            used in its public-facing incident summaries, and which the
            institution itself has not contested — has become the canonical
            example of the mechanism. The bank, a $340m community institution
            serving three counties in central Missouri, had implemented the
            FFIEC's general cybersecurity guidance thoroughly and had, in
            2027, hired an external consultant to prepare a PQC migration
            roadmap. The roadmap called for completion by the end of 2033. In
            the twelve months preceding February 2029, an adversary — later
            assessed by CISA to be a financially motivated group operating
            under the umbrella of a sanctioned state — had passively recorded
            a substantial volume of encrypted traffic from the bank's
            public-facing endpoints. The adversary had no immediate use for
            the encrypted traffic. They had, however, a strategic plan.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <KeyRecoveryAnatomy />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            The technical details of what happened between the fifth of
            February and the fourteenth have been partially redacted in the
            FDIC's public filings, but the general shape is now well-documented
            in the forensic literature. Within seventy-two hours of the
            breakthrough paper becoming public, the adversary had derived the
            bank's RSA-2048 signing certificate from passive traffic. Within
            five days, they had stood up a TLS-terminating middleman that
            produced signatures valid under the bank's own certificate. Within
            eight days, they had used that capability to sign wire
            instructions against the bank's correspondent relationships.
            Within nine days, they had moved $47m.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The institution detected the loss only when the receiving
            correspondent flagged the wire-velocity anomaly — a control that
            existed for entirely unrelated reasons and that, in retrospect,
            saved the bank from a significantly worse outcome. Merchants First
            had no mechanism to prove which signatures were genuinely theirs
            and which were not, because the signatures were cryptographically
            indistinguishable. The FDIC placed the institution into bridge
            status under Part 360 on the eleventh day. Depositors were
            protected. Institutional continuity was preserved. The $47m is
            the subject of ongoing recovery efforts and is likely to remain
            partially unrecovered.
          </Para>
        </Reveal>

        <PullQuote attribution="David Kowalski, rural community banker (unrelated institution)">
          I read the guidance in 2024. I read it again in 2026. I thought I
          had until 2033. The guidance did not tell me I had until 2029. It
          could not have, because nobody knew. But somewhere between those
          two statements is the reason my peers in Missouri are in bridge
          status.
        </PullQuote>

        <SectionHead kicker="Part V">The regulatory response</SectionHead>

        <Reveal>
          <Para>
            The federal banking agencies had been rehearsing some version of
            this scenario in joint tabletop exercises since 2024, and the
            speed with which coordinated action followed the breakthrough was,
            by historical standards, remarkable. On the sixth of February, the
            Federal Reserve, OCC, FDIC, and NCUA issued a joint statement
            invoking emergency cybersecurity authority under the Gramm-Leach-Bliley Act and directing all supervised institutions to
            immediately inventory their RSA and ECC-dependent systems and
            report to their primary regulator within fourteen days. On the
            ninth, the Conference of State Bank Supervisors successfully
            coordinated an aligned response across all fifty state banking
            departments — the first operational use of the Nationwide
            Cooperative Agreement framework that had been signed in 2026.
          </Para>
        </Reveal>
      </article>

      <div style={{ maxWidth: 1060, margin: "0 auto", padding: "0 28px" }}>
        <RegulatoryTimeline />
      </div>

      <article style={{ maxWidth: 780, margin: "0 auto", padding: "0 28px" }}>
        <Reveal>
          <Para>
            The most consequential piece of emergency guidance, issued by the
            FFIEC on the twenty-second of February, did two things. It
            mandated hybrid signature schemes — classical RSA or ECC paired
            with the NIST-standardised ML-DSA — for all wire authorisation
            above $1m, with a compliance deadline of June 30. And it did
            something that no previous federal guidance had done: it
            explicitly recognised that AI-assisted cryptographic inventory and
            migration, conducted under appropriate governance, met the
            Prompt Corrective Action expectations that would otherwise have
            been impossible for community banks to meet on the timeline
            demanded.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            This last provision was, for the tier of the industry most
            affected, the genuinely decisive measure. It meant that a
            community bank that did not have the budget to hire a specialist
            consulting firm could nonetheless, using the AI tools that had by
            then become standard in the industry, complete an acceptable
            cryptographic migration in time to avoid regulatory sanction and,
            more importantly, to avoid becoming the next Merchants First. The
            FFIEC's recognition of AI-assisted migration was not an
            endorsement of the technology so much as a recognition of
            arithmetic. There were 3,842 community banks. There were
            approximately 180 consulting firms with the specialist capability
            to conduct migration. The arithmetic only closed if the banks
            could do the work themselves, which they could only do with
            substantial AI assistance.
          </Para>
        </Reveal>

        <SectionHead kicker="Part VI">The mythos, reconsidered</SectionHead>

        <Reveal>
          <Para>
            It has become customary, in the months since the breakthrough, to
            describe what happened as a "Claude moment" — a usage that
            irritates the engineers at the various model labs whose products
            were involved, because the actual migration work spanned multiple
            model families and the framing implies a single heroic technology
            where what actually existed was an ecosystem of competing tools
            that had, by 2028, become capable enough to matter. The framing
            is, however, not wholly wrong. The population of generative AI
            systems deployed inside US financial institutions in early 2029
            was capable enough to make a previously impossible migration
            possible for institutions that would otherwise have been priced
            out. It was not capable enough to make the migration automatic.
            The institutions that survived did the work. The ones that did
            not, did not.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            There is a tendency, in moments of technological rupture, to
            describe the survivors as visionary and the victims as negligent.
            Neither is accurate in this case. The surviving institutions were,
            overwhelmingly, large enough to have well-resourced technology
            functions and long enough data-protection horizons to have taken
            the Mosca arithmetic seriously when it was presented to them in
            2023 and 2024. The victims were, overwhelmingly, small institutions
            whose risk-weighted assessment of the threat, given the
            information available, was not unreasonable. The breakthrough
            simply arrived before the information warranting a different
            assessment did.
          </Para>
        </Reveal>

        <PullQuote attribution="Patricia Huang, Georgetown Law">
          This is the kind of risk that regulatory frameworks built around
          historical precedent are structurally bad at pricing. There was no
          2008 for quantum. There was no SVB for quantum. The first event and
          the last event will be the same event.
        </PullQuote>

        <Reveal>
          <Para>
            The longer-term consequences are still resolving. One hundred and
            sixty-three community banks entered bridge status in the month
            following the breakthrough; of those, 89 have been resolved
            through assisted acquisitions by better-capitalised institutions,
            52 are operating under conservatorship, and 22 remain in legal
            proceedings regarding the allocation of the forged-wire losses
            between the banks, their correspondent institutions, and their
            insurers. The aggregate direct loss to the FDIC's Deposit
            Insurance Fund is estimated at $4.2bn — significant, though well
            below the $15bn from the 2023 regional bank failures. The
            aggregate indirect consequences — the acceleration of community
            bank consolidation, the compressed trust in small-institution
            cryptographic posture, the reshaping of the supervisory
            expectations for cyber resilience — are both larger and harder to
            measure.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            The broader question — whether the lesson of February 2029 is
            about quantum computing, or about AI, or about the fundamental
            difficulty of supervising a financial system whose critical
            infrastructure depends on mathematical assumptions that can change
            overnight — is one that the industry is still, in the honest
            admission of most of its senior regulators, working out. A
            Treasury task force convened in March is expected to issue a
            report later in the year. The report is not expected to answer the
            question. It is expected to ask a better one.
          </Para>
        </Reveal>

        <Reveal>
          <Para>
            What is not uncertain is the shape of the industry that emerged.
            Fewer community banks. More assisted acquisitions. An accelerated
            migration to post-quantum cryptography, driven both by the threat
            and by the regulatory machinery the threat activated. A tier of
            AI tools, once regarded as curiosities, now understood as
            essential infrastructure — priced accordingly, and increasingly
            regulated as such. And a cohort of institutions that would
            otherwise have survived another ten years, which did not survive
            the spring of 2029 because a demonstration in a lab in New York
            closed a window that had been, without their knowledge, closing
            for months.
          </Para>
        </Reveal>

        <PullQuote>
          The institutions furthest along on AI-assisted migration survived.
          The ones behind did not. Between those two facts is the story of
          American banking in the spring of 2029.
        </PullQuote>

      + '<div style="font-size:15px;margin-bottom:14px;">' + title + '</div>'
      + '<div style="font-family:Inconsolata,monospace;font-size:12px;color:#6B6354;'
      + 'background:#EBE2CE;padding:10px 12px;border-radius:2px;word-break:break-all;">'
      + detail + '</div>'
      + '<div style="font-size:13px;color:#6B6354;margin-top:14px;font-style:italic;">'
      + 'This page uses React, Recharts, and Babel loaded from a public CDN. '
      + 'If you are viewing this from GitHub\u2019s raw file view or opening '
      + 'it directly from disk in a restrictive browser, please serve it via '
      + 'GitHub Pages or a local HTTP server instead.'
      + '</div></div>';
  }

  function loadScript(urls, globalKey, name) {
    return new Promise(function (resolve, reject) {
      var attempt = 0;
      function tryNext() {
        if (attempt >= urls.length) {
          reject(new Error(name + ": all " + urls.length + " CDN sources failed"));
          return;
        }
        var url = urls[attempt++];
        var s = document.createElement("script");
        s.src = url;
        s.async = false;
        s.crossOrigin = "anonymous";
        s.onload = function () {
          if (typeof window[globalKey] !== "undefined") {
            resolve();
          } else {
            tryNext();
          }
        };
        s.onerror = function () { tryNext(); };
        document.head.appendChild(s);
      }
      tryNext();
    });
  }

  function loadAll() {
    var chain = Promise.resolve();
    DEPS.forEach(function (d) {
      chain = chain.then(function () {
        setStatus("Loading " + d.name + "\u2026");
        return loadScript(d.urls, d.globalKey, d.name);
      });
    });
    return chain;
  }

  function compileAndRun() {
    setStatus("Compiling interactive figures\u2026");
    var srcEl = document.getElementById("article-jsx");
    if (!srcEl) {
      throw new Error("Article source not found");
    }
    var jsxSource = srcEl.textContent;
    var compiled = window.Babel.transform(jsxSource, {
      presets: ["react"]
    }).code;
    (new Function(compiled))();
  }

  loadAll()
    .then(function () {
      try {
        compileAndRun();
      } catch (err) {
        console.error(err);
        showError(
          "The interactive figures failed to compile.",
          String(err && err.stack ? err.stack : err)
        );
      }
    })
    .catch(function (err) {
      console.error(err);
      showError(
        "A required library could not be loaded from the CDN.",
        String(err && err.message ? err.message : err)
      );
    });

  setTimeout(function () {
    var loading = document.getElementById("root-loading");
    if (loading && loading.isConnected && typeof window.React === "undefined") {
      showError(
        "The page has been loading for 20 seconds with no library available yet.",
        "Your browser could not reach unpkg.com or cdn.jsdelivr.net. "
          + "Check your network connection, or host this file through GitHub "
          + "Pages (or any HTTP server) rather than opening it directly from disk."
      );
    }
  }, 20000);
})();
</script>
</body>
</html>
